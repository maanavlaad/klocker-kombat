<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Klocker Kombat</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P','Courier New',monospace;overflow-x:hidden;}
#wrap{position:relative;width:100%;max-width:960px;}
canvas{display:block;image-rendering:pixelated;width:100%;max-width:960px;height:auto;aspect-ratio:16/9;cursor:pointer;}
#hud{padding:6px 10px;background:#0a0a0f;display:none;}
.hr{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.bw{flex:1;}.bl{font-size:6px;margin-bottom:2px;letter-spacing:1px;}
.bo{height:13px;background:#111;border:1px solid #333;overflow:hidden;}
.bi{height:100%;transition:width .08s;}
.mo{height:6px;background:#111;border:1px solid #222;overflow:hidden;margin-top:2px;}
.mi{height:100%;transition:width .12s;}
.tb{font-size:15px;color:#fff;text-align:center;min-width:40px;text-shadow:0 0 8px #0df;}
.rb{font-size:5px;text-align:center;color:#888;min-width:72px;}
.pip{display:inline-block;width:8px;height:8px;border:1px solid #555;margin:1px;}
.pip.w{background:#ff4;}
.badge{font-size:5px;padding:1px 3px;margin-top:1px;display:inline-block;}
#cb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:3px 0;border-top:1px solid #1a1a1a;margin-top:2px;}
.ct{font-size:5px;color:#444;}.ct b{color:#777;}
/* Info overlay */
#infoOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;}
#infoOverlay.show{display:flex;}
#infoBox{background:#0a0a1a;border:2px solid #0df;padding:24px 32px;max-width:680px;width:90%;max-height:85vh;overflow-y:auto;}
#infoBox h2{font-size:12px;color:#0df;margin-bottom:16px;text-align:center;letter-spacing:2px;}
.info-char{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #1a1a2e;}
.info-char h3{font-size:8px;margin-bottom:8px;}
.info-char p{font-size:6px;color:#888;line-height:1.9;margin-bottom:4px;}
.info-char .moves{font-size:5px;color:#666;line-height:2;}
.close-btn{display:block;margin:16px auto 0;font-family:'Press Start 2P',monospace;font-size:8px;background:transparent;border:1px solid #0df;color:#0df;padding:8px 20px;cursor:pointer;letter-spacing:1px;}
.close-btn:hover{background:rgba(0,220,255,.1);}
.stat-row{display:flex;gap:12px;margin:4px 0;}
.stat-item{font-size:5px;color:#888;}
.stat-bar-mini{display:inline-block;height:4px;background:#0df;vertical-align:middle;margin-left:4px;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc" width="800" height="450"></canvas>
<div id="hud">
  <div class="hr">
    <div class="bw">
      <div class="bl" id="p1n" style="color:#4af">P1</div>
      <div class="bo"><div class="bi" id="p1h" style="background:#44ff88;width:100%"></div></div>
      <div class="mo"><div class="mi" id="p1m" style="width:0%;background:#f44"></div></div>
      <div class="mo" id="p1m2wrap" style="display:none;margin-top:1px"><div class="mi" id="p1m2" style="width:0%;background:#88ff00"></div></div>
      <div class="badge" id="p1b" style="color:#f44"></div>
    </div>
    <div style="text-align:center;min-width:80px;">
      <div class="tb" id="tmr">99</div>
      <div class="rb" id="rnd"></div>
    </div>
    <div class="bw">
      <div class="bl" id="p2n" style="color:#f84;text-align:right">P2</div>
      <div class="bo" style="direction:rtl"><div class="bi" id="p2h" style="background:#44ff88;width:100%"></div></div>
      <div class="mo" style="direction:rtl"><div class="mi" id="p2m" style="width:100%;background:#f8c"></div></div>
      <div class="mo" id="p2m2wrap" style="display:none;direction:rtl;margin-top:1px"><div class="mi" id="p2m2" style="width:0%;background:#88ff00"></div></div>
      <div class="badge" id="p2b" style="color:#f8c;float:right"></div>
    </div>
  </div>
  <div id="cb">
    <div class="ct">P1: <b>WASD</b> move/jump &middot; <b>F</b> punch &middot; <b>G</b> kick/block &middot; <b>H</b> special &middot; <b>E</b> ability</div>
    <div class="ct">P2: <b>ARROWS</b> move/jump &middot; <b>,</b> punch &middot; <b>.</b> kick/block &middot; <b>/</b> special &middot; <b>0</b> ability</div>
  </div>
</div>
</div>

<!-- Info Overlay -->
<div id="infoOverlay">
<div id="infoBox">
  <h2>CHARACTER ROSTER</h2>
  <div id="infoContent"></div>
  <button class="close-btn" onclick="document.getElementById('infoOverlay').classList.remove('show')">CLOSE [ESC]</button>
</div>
</div>

<script>
const C=document.getElementById('gc'),ctx=C.getContext('2d');

const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();
  if(e.key==='Escape')document.getElementById('infoOverlay').classList.remove('show');
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ===== AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
const beep=(f,d,t='square',v=0.15)=>{
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}
};
const hitSnd=(h=false)=>{beep(h?80:180,.12,'square',.18);setTimeout(()=>beep(h?50:120,.08,'sawtooth',.1),40);};
const spcSnd=()=>{beep(220,.05);setTimeout(()=>beep(440,.05),60);setTimeout(()=>beep(880,.12),120);};
const koSnd=()=>{beep(200,.1);setTimeout(()=>beep(150,.1),100);setTimeout(()=>beep(100,.35,'sawtooth',.3),200);};
const selSnd=()=>beep(440,.05,'square',.1);
const cfmSnd=()=>{beep(440,.05);setTimeout(()=>beep(660,.1),80);};
const cntSnd=(n)=>{beep(n===0?880:440,.15,'square',.25);};

const BASS=  [131,131,196,196,131,131,165,165,131,131,196,196,262,262,196,196];
let melIdx=0;
function playMusicTick(){
  beep(MELODY[melIdx%MELODY.length],.18,'square',.08);
  beep(BASS[melIdx%BASS.length],.18,'triangle',.06);
  melIdx++;
}
function startMusic(){if(musicInterval)return;melIdx=0;musicInterval=setInterval(playMusicTick,180);}
function stopMusic(){clearInterval(musicInterval);musicInterval=null;}

function playFightTick(){
  beep(FM[fmIdx%FM.length],.1,'square',.05);
  beep(FB[fmIdx%FB.length],.1,'triangle',.04);

}
function startFightMusic(){if(fightMusicInterval)return;fmIdx=0;fightMusicInterval=setInterval(playFightTick,130);}
function stopFightMusic(){clearInterval(fightMusicInterval);fightMusicInterval=null;}

function getRandomCards(p,n){
  // filter: include universal + char-specific for this player
  const charId=CHARS[p.ci].id;
  const pool=CARD_POOL.filter(c=>!c.charId||c.charId===charId);
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,n);
}

// Card screen state
let cardScreen={
  active:false,
  loser:null, // P1 or P2
  p1Cards:[],p2Cards:[],
  p1Sel:0,p2Sel:0,
  p1Confirmed:false,p2Confirmed:false,
  timer:0,maxTimer:600, // 10 seconds at 60fps
};

function startCardScreen(loser){
  cardScreen.active=true;
  cardScreen.loser=loser;
  // Only loser gets cards
  if(loser===P1||loser==='both'){cardScreen.p1Cards=getRandomCards(P1,3);cardScreen.p1Sel=0;cardScreen.p1Confirmed=false;}
  else cardScreen.p1Cards=[];
  if(loser===P2||loser==='both'){cardScreen.p2Cards=getRandomCards(P2,3);cardScreen.p2Sel=0;cardScreen.p2Confirmed=false;}
  else cardScreen.p2Cards=[];
  cardScreen.timer=cardScreen.maxTimer;
}

function applyCard(p,card){
  p.cards.push(card.id);
  card.apply(p);
}

function drawCardScreen(){
  if(!cardScreen.active)return;
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='14px "Press Start 2P"';ctx.fillStyle='#ff4';
  ctx.shadowColor='#ff4';ctx.shadowBlur=10;
  ctx.fillText('ROUND OVER — PICK A CARD',W/2,35);
  ctx.shadowBlur=0;

  // Timer bar
  const pct=cardScreen.timer/cardScreen.maxTimer;
  ctx.fillStyle='#222';ctx.fillRect(W/2-100,50,200,8);
  ctx.fillStyle=pct>0.4?'#4f4':'#f44';ctx.fillRect(W/2-100,50,200*pct,8);
  ctx.font='6px "Press Start 2P"';ctx.fillStyle='#888';
  ctx.fillText('AUTO-PICK IN '+Math.ceil(cardScreen.timer/60)+'s',W/2,70);

  function drawCards(cards,sel,confirmed,side){
    if(!cards||cards.length===0){
      ctx.fillStyle='#444';ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
      ctx.fillText(side==='left'?'P1 WON':'P2 WON',side==='left'?W/4:3*W/4,H/2);
      ctx.font='6px "Press Start 2P"';ctx.fillStyle='#333';
      ctx.fillText('NO CARD THIS ROUND',side==='left'?W/4:3*W/4,H/2+20);
      return;
    }
    const cx=side==='left'?W/4:3*W/4;
    const label=side==='left'?'P1':'P2';
    const labelColor=side==='left'?'#4af':'#f84';
    ctx.font='7px "Press Start 2P"';ctx.fillStyle=labelColor;ctx.textAlign='center';
    ctx.fillText(label+' — PICK A BUFF',cx,85);
    ctx.font='5px "Press Start 2P"';ctx.fillStyle='#666';
    ctx.fillText(side==='left'?'A/D select  F confirm':'←/→ select  , confirm',cx,97);

    cards.forEach((card,i)=>{
      const isSelected=sel===i;
      const cardW=160,cardH=95;
      const cardX=cx-cardW/2;
      const cardY=108+i*(cardH+8);

      // card background
      ctx.fillStyle=isSelected?'#1a1a2e':'#0d0d18';
      ctx.fillRect(cardX,cardY,cardW,cardH);
      // colored border
      ctx.strokeStyle=isSelected?card.color:'#333';
      ctx.lineWidth=isSelected?3:1;
      ctx.strokeRect(cardX,cardY,cardW,cardH);

      // glow on selected
      if(isSelected){
        ctx.shadowColor=card.color;ctx.shadowBlur=12;
        ctx.strokeRect(cardX,cardY,cardW,cardH);
        ctx.shadowBlur=0;
      }

      // type badge
      const typeColors={stat:'#4488ff',passive:'#cc44ff',attack:'#ff6644',hazard:'#44bb44',char:'#ffaa44'};
      ctx.fillStyle=typeColors[card.type]||'#888';
      ctx.fillRect(cardX+4,cardY+4,40,12);
      ctx.font='4px "Press Start 2P"';ctx.fillStyle='#fff';ctx.textAlign='left';
      ctx.fillText(card.type.toUpperCase(),cardX+6,cardY+13);

      // card name
      ctx.font='7px "Press Start 2P"';ctx.fillStyle=card.color;ctx.textAlign='center';
      ctx.fillText(card.name,cx,cardY+30);

      // desc
      ctx.font='5px "Press Start 2P"';ctx.fillStyle='#aaa';
      // wrap text
      const words=card.desc.split(' ');let line='';let ly=cardY+46;
      words.forEach(w=>{
        if((line+w).length>22){ctx.fillText(line.trim(),cx,ly);line='';ly+=12;}
        line+=w+' ';
      });
      if(line)ctx.fillText(line.trim(),cx,ly);

      // confirmed checkmark
      if(confirmed&&sel===i){
        ctx.fillStyle='rgba(0,255,0,0.2)';ctx.fillRect(cardX,cardY,cardW,cardH);
        ctx.font='10px "Press Start 2P"';ctx.fillStyle='#4f4';ctx.textAlign='center';
        ctx.fillText('CONFIRMED!',cx,cardY+cardH/2+4);
      }
    });
  }

  drawCards(cardScreen.p1Cards,cardScreen.p1Sel,cardScreen.p1Confirmed,'left');
  drawCards(cardScreen.p2Cards,cardScreen.p2Sel,cardScreen.p2Confirmed,'right');
}

function updateCardScreen(){
  if(!cardScreen.active)return;
  cardScreen.timer--;
  // auto-pick on timeout
  if(cardScreen.timer<=0){
    if(cardScreen.p1Cards.length>0&&!cardScreen.p1Confirmed){
      applyCard(P1,cardScreen.p1Cards[cardScreen.p1Sel]);
      cardScreen.p1Confirmed=true;
    }
    if(cardScreen.p2Cards.length>0&&!cardScreen.p2Confirmed){
      applyCard(P2,cardScreen.p2Cards[cardScreen.p2Sel]);
      cardScreen.p2Confirmed=true;
    }
  }
  const p1done=cardScreen.p1Cards.length===0||cardScreen.p1Confirmed;
  const p2done=cardScreen.p2Cards.length===0||cardScreen.p2Confirmed;
  if(p1done&&p2done){
    cardScreen.active=false;
    setTimeout(()=>beginCountdown(),400);
  }
}

// ===== SPRITE SYSTEM =====
// After ctx.translate(cx,cy) + ctx.scale(fac,1),
// all coords are RELATIVE to origin. No cx/cy in fillRect calls.
// S=3 (was 4 - slightly smaller per feedback)
// by = top of sprite relative to ground (negative = above ground)
// Ground is at y=0 after translate

const S=3;

function _r(v){return Math.round(v);}

// Draw a single pixel at grid position (x,y) relative to current transform
function dp(x,y,c){
  ctx.fillStyle=c;
  ctx.fillRect(_r(x*S),_r(y*S),S,S);
}
// Draw filled rect from (x1,y1) to (x2,y2) inclusive
function dr(x1,y1,x2,y2,c){
  ctx.fillStyle=c;
  ctx.fillRect(_r(x1*S),_r(y1*S),(x2-x1+1)*S,(y2-y1+1)*S);
}
// Draw horizontal span
function dh(y,x1,x2,c){dr(x1,y,x2,y,c);}
// Draw vertical span
function dv(x,y1,y2,c){dr(x,y1,x,y2,c);}

// Animation phase helpers (based on atkProg 0→1)
function phPeak(ap){ return Math.sin(Math.max(0,Math.min(1,ap))*Math.PI); }
function phWind(ap){ return Math.max(0,Math.min(1,(0.3-ap)/0.3)); }  // 1→0 during 0→0.3
function phStr(ap){  return Math.max(0,Math.min(1,(ap-0.3)/0.3)); }  // 0→1 during 0.3→0.6
function phFol(ap){  return Math.max(0,Math.min(1,(ap-0.6)/0.4)); }  // 0→1 during 0.6→1.0

// Shared head: origin at top-left of head bounding box
// headX/headY are grid offsets from sprite origin
function drawHead(hx,hy,hair,skin,eyeC,mouthC){
  // hair cap
  dr(hx-1,hy,   hx+9,hy,  hair);
  dr(hx-2,hy+1, hx+10,hy+2,hair);
  dp(hx-2,hy+3,hair); dp(hx+10,hy+3,hair);
  // face
  dr(hx-1,hy+2, hx+9,hy+8, skin);
  // eyes
  dp(hx+1,hy+4,eyeC); dp(hx+2,hy+4,eyeC);
  dp(hx+6,hy+4,eyeC); dp(hx+7,hy+4,eyeC);
  // mouth
  dh(hy+7, hx+2, hx+7, mouthC);
  // ear shading
  dp(hx-1,hy+4,'#c8a070'); dp(hx+9,hy+4,'#c8a070');
  // neck
  dr(hx+3,hy+8, hx+6,hy+9, skin);
}

function drawDima(cx,cy,fac,state,rageOn,ap){
  const t=Date.now();
  const peak=phPeak(ap), wu=phWind(ap), str=phStr(ap), fol=phFol(ap);
  const boost=rageOn?1.15:1;
  const bob=state==='idle'?Math.sin(t*0.005)*1.2:0;
  const wc=Math.sin(t*0.013);
  const hair=rageOn?'#cc1100':'#8B5E3C';
  const hairDark=rageOn?'#991100':'#6B4E2C';
  const shirt=rageOn?'#cc0000':'#2a66cc';
  const shirtDark=rageOn?'#990000':'#1a4499';
  const skin=rageOn?'#ffccaa':'#e0b890';
  const skinShade=rageOn?'#ddaa88':'#c8a070';
  const pant=rageOn?'#442200':'#223355';

  ctx.save();
  ctx.translate(_r(cx), _r(cy));
  ctx.scale(fac*boost, boost);

  const by=-33;
  const lean=state==='punch'?_r(str*2-wu*1):0;
  const hbob=_r(bob);

  // HEAD
  dr(lean-5,by+hbob, lean+5,by+1+hbob, hair);
  dr(lean-6,by+2+hbob, lean+6,by+3+hbob, hair);
  // Hair highlight
  ctx.fillStyle=rageOn?'#ff4422':'#a87050';
  ctx.fillRect(_r((lean-3)*S),_r((by+1+hbob)*S),S*3,S);
  dp(lean-6,by+4+hbob,hair); dp(lean+6,by+4+hbob,hair);
  dr(lean-5,by+3+hbob, lean+5,by+9+hbob, skin);
  // Face shading
  ctx.fillStyle=skinShade;
  ctx.fillRect(_r((lean+3)*S),_r((by+4+hbob)*S),S*2,S*4);
  // Eyebrows
  ctx.fillStyle=rageOn?'#880000':'#5a4020';
  ctx.fillRect(_r((lean-4)*S),_r((by+4+hbob)*S),S*3,S);
  ctx.fillRect(_r((lean+1)*S),_r((by+4+hbob)*S),S*3,S);
  // eyes
  ctx.fillStyle=rageOn?'#ff0':'#222';
  ctx.fillRect(_r((lean-3)*S),_r((by+5+hbob)*S),S*2,S);
  ctx.fillRect(_r((lean+2)*S),_r((by+5+hbob)*S),S*2,S);
  // Eye glint
  if(!rageOn){ctx.fillStyle='#fff';ctx.fillRect(_r((lean-3)*S),_r((by+5+hbob)*S),S,S);}
  // mouth
  ctx.fillStyle=rageOn?'#f00':'#444';
  ctx.fillRect(_r((lean-2)*S),_r((by+8+hbob)*S),S*4,S);
  // neck
  ctx.fillStyle=skin;
  ctx.fillRect(_r((lean-1)*S),_r((by+9+hbob)*S),S*3,S);

  // TORSO
  dr(lean-5,by+10, lean+5,by+20, shirt);
  // Shirt shading
  ctx.fillStyle=shirtDark;
  ctx.fillRect(_r((lean+2)*S),_r((by+12)*S),S*3,S*6);
  // collar
  ctx.fillStyle=rageOn?'#ff4400':'#4488ff';
  ctx.fillRect(_r((lean-2)*S),_r((by+10)*S),S*4,S);

  // ARMS
  if(state==='punch'){
    const windX=_r(-wu*3), ae=_r(str*7-fol*2);
    dr(lean+windX-6,by+11, lean+windX-4,by+17, shirt);
    ctx.fillStyle=skin; ctx.fillRect(_r((lean+windX-6)*S),_r((by+17)*S),S*2,S*2);
    dr(lean+4,by+12, lean+4+ae+4,by+14, shirt);
    ctx.fillStyle=skin; ctx.fillRect(_r((lean+4+ae+4)*S),_r((by+11)*S),S*2,S*3);
    if(rageOn&&str>0.3){ctx.fillStyle=`rgba(255,80,0,${str*0.28})`;ctx.fillRect(_r((lean+3)*S),_r((by+9)*S),_r((ae+7)*S),S*8);}
  } else if(state==='kick'){
    dr(-7,by+11, -5,by+16, shirt); ctx.fillStyle=skin; ctx.fillRect(_r(-8*S),_r((by+16)*S),S*2,S*2);
    dr(4,by+11, 6,by+16, shirt);   ctx.fillStyle=skin; ctx.fillRect(_r(6*S),_r((by+16)*S),S*2,S*2);
  } else {
    const sw=state==='walk'?_r(wc*3):0;
    dr(4,by+11,  5,by+17+sw, shirt); ctx.fillStyle=skin; ctx.fillRect(_r(4*S),_r((by+17+sw)*S),S*2,S*2);
    dr(-6,by+11, -5,by+17-sw, shirt); ctx.fillStyle=skin; ctx.fillRect(_r(-7*S),_r((by+17-sw)*S),S*2,S*2);
  }

  // LEGS
  if(state==='kick'){
    // planted back leg
    dr(-5,by+21, -3,by+32, pant); ctx.fillStyle='#111'; ctx.fillRect(_r(-6*S),_r((by+32)*S),S*4,S*2);
    // sweeping front leg
    const lx=_r(str*7-fol*2), ly=_r(-peak*4);
    dr(1,by+21+ly, 1+lx+2,by+22+ly, pant);
    dr(2+lx,by+21+ly, 3+lx,by+27+ly, pant);
    ctx.fillStyle='#111'; ctx.fillRect(_r((1+lx)*S),_r((by+27+ly)*S),S*4,S*2);
    if(rageOn&&peak>0.4){ctx.fillStyle=`rgba(255,60,0,${peak*0.22})`;ctx.fillRect(_r((1+lx)*S),_r((by+19+ly)*S),S*5,S*7);}
  } else {
    const lo=state==='walk'?_r(wc*4):0;
    dr(-5,by+21, -3,by+31+lo, pant); ctx.fillStyle='#111'; ctx.fillRect(_r(-6*S),_r((by+31+lo)*S),S*4,S*2);
    dr(2,by+21, 4,by+31-lo, pant);   ctx.fillStyle='#111'; ctx.fillRect(_r(1*S),_r((by+31-lo)*S),S*4,S*2);
  }

  if(rageOn){
    ctx.globalAlpha=0.06+0.04*Math.sin(t*0.01);
    ctx.fillStyle='#ff2200';
    ctx.fillRect(_r(-9*S),_r((by)*S),S*19,S*34);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ══════════════════════════════════════════
function drawNick(cx,cy,fac,state,ap,dodgeBuffed,techTier){
  const t=Date.now();
  const peak=phPeak(ap), wu=phWind(ap), str=phStr(ap), fol=phFol(ap);
  const bob=state==='idle'?Math.sin(t*0.005)*1.2:0;
  const wc=Math.sin(t*0.013);
  const skin='#e0b890';
  const tier=techTier||1;

  ctx.save();
  ctx.translate(_r(cx),_r(cy));
  ctx.scale(fac,1);
  const by=-33;
  const lean=state==='punch'?_r(str*2):0;
  const hbob=_r(bob);

  // ── TECH TIER AURA (background glow) ──
  if(tier>=2){
    const auraAlpha=tier>=3?0.15:0.08;
    const auraSize=tier>=3?1.3:1.15;
    ctx.globalAlpha=auraAlpha+0.05*Math.sin(t*0.008);
    ctx.fillStyle=tier>=3?'#00ffaa':'#88ffcc';
    ctx.beginPath();
    ctx.ellipse(0,(by+16)*S,22*auraSize,40*auraSize,0,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── DODGE BUFF GLOW ──
  if(dodgeBuffed){
    const pulse=0.2+0.15*Math.sin(t*0.02);
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffee44';
    ctx.fillRect(-8*S,(by-2)*S,S*17,S*36);
    ctx.globalAlpha=1;
  }

  // HEAD: floppy brown hair
  dr(lean-5,by+hbob, lean+5,by+1+hbob,'#c4903a');
  dr(lean-6,by+2+hbob, lean+7,by+3+hbob,'#c4903a');
  dr(lean-8,by+3+hbob, lean-5,by+5+hbob,'#c4903a'); // fringe droop
  dr(lean-5,by+3+hbob, lean+6,by+3+hbob,'#c4903a');
  dr(lean-5,by+3+hbob, lean+5,by+9+hbob, skin);
  // Eyes — glow at higher tiers
  const eyeCol=tier>=3?'#00ffaa':tier>=2?'#4a8':'#333';
  ctx.fillStyle=eyeCol;
  ctx.fillRect(_r((lean-2)*S),_r((by+5+hbob)*S),S,S);
  ctx.fillRect(_r((lean+2)*S),_r((by+5+hbob)*S),S,S);
  ctx.fillStyle='#333';
  ctx.fillRect(_r((lean-1)*S),_r((by+8+hbob)*S),S*3,S);
  ctx.fillStyle=skin; ctx.fillRect(_r((lean-1)*S),_r((by+9+hbob)*S),S*3,S);

  // TORSO: utility vest — tinted by tech tier
  const vestBase=tier>=3?'#2a8a5a':tier>=2?'#3a7a4a':'#3a6a3a';
  const vestLight=tier>=3?'#aaffcc':tier>=2?'#ccf8dd':'#dde8cc';
  for(let x=-5;x<=5;x++) for(let y=by+10;y<=by+20;y++){
    ctx.fillStyle=(x<-2||x>2)?vestBase:vestLight;
    ctx.fillRect(_r((lean+x)*S),_r(y*S),S,S);
  }
  ctx.fillStyle='#aaa'; ctx.fillRect(_r((lean-5)*S),_r((by+20)*S),S*11,S); // belt
  // Wrench — glows when empowered
  ctx.fillStyle=dodgeBuffed?'#ffee44':'#888';
  ctx.fillRect(_r((lean+3)*S),_r((by+21)*S),S,S*2);
  if(dodgeBuffed){
    ctx.fillStyle='rgba(255,238,68,0.5)';
    ctx.fillRect(_r((lean+2)*S),_r((by+20)*S),S*3,S*4);
  }

  // ARMS
  if(state==='punch'){
    const wb=_r(wu*3), ae=_r(str*8-fol*3);
    dr(lean-7-wb,by+11, lean-5-wb,by+17,vestBase);
    ctx.fillStyle=skin; ctx.fillRect(_r((lean-8-wb)*S),_r((by+17)*S),S*2,S*2);
    dr(lean+4,by+11, lean+4+ae+3,by+13,vestBase);

    dr(-7,by+11,-5,by+15,'#555'); ctx.fillStyle=skin;ctx.fillRect(_r(-8*S),_r((by+15)*S),S*2,S*2);

    dr(lean+5,by+3,lean+9,by+6,'#ffcc00');
    // golden tint on eyes
    ctx.fillStyle='#ffee00';
    ctx.fillRect(_r((lean-3)*S),_r((by+5)*S),S*2,S);
    ctx.fillRect(_r((lean+2)*S),_r((by+5)*S),S*2,S);
    // aura flames rising
    const ft=Date.now()*0.008;
    for(let i=0;i<3;i++){
      const fx=_r((lean-4+i*4+Math.sin(ft+i)*2)*S);

  // stink dots
  ctx.fillStyle='rgba(80,255,80,.4)';
  ctx.fillRect(_r(-8*S),_r((by+11)*S),S,S);

  ctx.restore();
}

// ══════════════════════════════════════════
// MAXWELL
// ══════════════════════════════════════════
function drawMaxwell(cx,cy,fac,state,ap){
  const t=Date.now();
  const peak=phPeak(ap), wu=phWind(ap), str=phStr(ap), fol=phFol(ap);
  const bob=state==='idle'?Math.sin(t*0.005)*1.2:0;
  const wc=Math.sin(t*0.013);
  const skin='#e0b890';

  ctx.save();
  ctx.translate(_r(cx),_r(cy));
  ctx.scale(fac,1);
  const by=-33;
  const hbob=_r(bob);

  // HEAD: dark curly hair
  dr(-5,by+hbob,5,by+1+hbob,'#5a3820');
  dr(-6,by+2+hbob,6,by+3+hbob,'#5a3820');
  ctx.fillStyle='#5a3820';
  ctx.fillRect(_r(-7*S),_r((by+2+hbob)*S),S,S); ctx.fillRect(_r(6*S),_r((by+2+hbob)*S),S,S);
  ctx.fillRect(_r(-6*S),_r((by+4+hbob)*S),S,S); ctx.fillRect(_r(5*S),_r((by+4+hbob)*S),S,S);
  dr(-5,by+3+hbob,5,by+9+hbob,skin);
  ctx.fillStyle='#222';
  ctx.fillRect(_r(-2*S),_r((by+5+hbob)*S),S*2,S);
  ctx.fillRect(_r(1*S),_r((by+5+hbob)*S),S*2,S);
  ctx.fillStyle='#444';ctx.fillRect(_r(-1*S),_r((by+8+hbob)*S),S*3,S);
  ctx.fillStyle=skin;ctx.fillRect(_r(-1*S),_r((by+9+hbob)*S),S*3,S);

  // TORSO: tactical vest
  for(let x=-5;x<=5;x++)for(let y=by+10;y<=by+20;y++){
    ctx.fillStyle=(x<-2||x>2)?'#3a4530':'#2a3520';
    ctx.fillRect(_r(x*S),_r(y*S),S,S);
  }
  ctx.fillStyle='#556644';
  ctx.fillRect(_r(-5*S),_r((by+13)*S),S*11,S); // chest strap
  ctx.fillRect(_r(-5*S),_r((by+17)*S),S*11,S);
  // holstered gun
  ctx.fillStyle='#777';ctx.fillRect(_r(5*S),_r((by+18)*S),S*2,S*4);
  ctx.fillStyle='#555';ctx.fillRect(_r(4*S),_r((by+18)*S),S,S*3);

  // ARMS
  if(state==='punch'){
    // gun arm raises to aim, fires on strike
    const gunY=_r(-wu*3);
    dr(-7,by+11,-5,by+16,'#3a4530');ctx.fillStyle=skin;ctx.fillRect(_r(-8*S),_r((by+16)*S),S*2,S*2);
    dr(4,by+11+gunY,5,by+16+gunY,'#3a4530');ctx.fillStyle=skin;ctx.fillRect(_r(5*S),_r((by+10+gunY)*S),S*2,S*2);
    ctx.fillStyle='#777';ctx.fillRect(_r(6*S),_r((by+9+gunY)*S),S*4,S*2);
    ctx.fillStyle='#555';ctx.fillRect(_r(9*S),_r((by+8+gunY)*S),S*2,S*3);
    if(str>0.3&&str<0.75){
      const f=(str-0.3)*2;
      ctx.fillStyle=`rgba(255,220,80,${f*0.55})`;ctx.fillRect(_r(10*S),_r((by+6+gunY)*S),S*4,S*4);
      ctx.strokeStyle=`rgba(255,200,50,0.65)`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(_r(11*S),_r((by+8+gunY)*S));ctx.lineTo(_r(20*S),_r((by+8+gunY)*S));ctx.stroke();
    }
  } else if(state==='kick'){
    dr(-6,by+12,-4,by+16,'#3a4530');ctx.fillStyle=skin;ctx.fillRect(_r(-7*S),_r((by+16)*S),S*2,S*2);
    dr(4,by+12,6,by+16,'#3a4530');  ctx.fillStyle=skin;ctx.fillRect(_r(6*S),_r((by+16)*S),S*2,S*2);
  } else {
    const sw=state==='walk'?_r(wc*3):0;
    dr(4,by+11,5,by+16+sw,'#3a4530');ctx.fillStyle=skin;ctx.fillRect(_r(4*S),_r((by+16+sw)*S),S*2,S*2);
    dr(-6,by+11,-5,by+16-sw,'#3a4530');ctx.fillStyle=skin;ctx.fillRect(_r(-7*S),_r((by+16-sw)*S),S*2,S*2);
  }

  // LEGS
  const lc='#2a3020';
  if(state==='kick'){
    dr(-5,by+21,-3,by+31,lc);ctx.fillStyle='#222';ctx.fillRect(_r(-6*S),_r((by+31)*S),S*4,S*2);
    const lx=_r(str*7-fol*2),ly=_r(-peak*4);
    dr(1,by+21+ly,1+lx+2,by+22+ly,lc);dr(2+lx,by+21+ly,3+lx,by+27+ly,lc);
    ctx.fillStyle='#222';ctx.fillRect(_r((1+lx)*S),_r((by+27+ly)*S),S*4,S*2);
    if(peak>0.3){ctx.fillStyle=`rgba(255,200,50,${peak*0.18})`;ctx.fillRect(_r((1+lx)*S),_r((by+19+ly)*S),S*5,S*6);}
  } else {
    const lo=state==='walk'?_r(wc*4):0;
    dr(-5,by+21,-3,by+31+lo,lc);ctx.fillStyle='#222';ctx.fillRect(_r(-6*S),_r((by+31+lo)*S),S*4,S*2);
    dr(2,by+21,4,by+31-lo,lc);  ctx.fillStyle='#222';ctx.fillRect(_r(1*S),_r((by+31-lo)*S),S*4,S*2);
  }
  ctx.restore();
}

// ══════════════════════════════════════════
// MAANAV
// ══════════════════════════════════════════
function drawMaanav(cx,cy,fac,state,titan,stamLow,ap){
  const t=Date.now();
  const peak=phPeak(ap), wu=phWind(ap), str=phStr(ap), fol=phFol(ap);
  const bob=state==='idle'?Math.sin(t*0.005)*1.2:0;
  const wc=Math.sin(t*0.013);

  if(titan){
    ctx.save();
    ctx.translate(_r(cx),_r(cy));
    ctx.scale(fac*1.8,1.8);
    const by=-33;
    const hbob=state==='idle'?Math.sin(t*0.004)*0.8:0;
    
    // ══ ATTACK TITAN — muscular exposed-muscle humanoid ══
    
    // LONG WILD HAIR — dark flowing locks like reference
    ctx.fillStyle='#1a1412';
    // Hair flows down past shoulders
    for(let i=-9;i<=9;i+=2){
      const hairLen=12+Math.abs(i)*0.8+Math.sin(t*0.003+i)*1.5;
      ctx.fillRect(_r(i*S),_r((by-2+hbob)*S),S*2,_r(hairLen*S));
    }
    // Top hair mass
    dr(-8,by-4+hbob,8,by+2+hbob,'#1a1412');
    dr(-10,by-2+hbob,-8,by+4+hbob,'#1a1412');
    dr(8,by-2+hbob,10,by+4+hbob,'#1a1412');
    
    // FACE — exposed muscle/skin tone like titan
    const skinTone='#d4956a'; // tan/flesh
    const muscleTone='#c4784a'; // darker muscle
    dr(-6,by+2+hbob,6,by+12+hbob,skinTone);
    // Jaw definition
    dr(-7,by+6+hbob,-6,by+10+hbob,muscleTone);
    dr(6,by+6+hbob,7,by+10+hbob,muscleTone);
    
    // Fierce eyes — glowing green, intense
    ctx.fillStyle='#88ff00';
    ctx.fillRect(_r(-4*S),_r((by+5+hbob)*S),S*2,S*2);
    ctx.fillRect(_r(2*S),_r((by+5+hbob)*S),S*2,S*2);
    // Eye glow effect
    ctx.fillStyle='rgba(136,255,0,0.3)';
    ctx.fillRect(_r(-5*S),_r((by+4+hbob)*S),S*4,S*4);
    ctx.fillRect(_r(1*S),_r((by+4+hbob)*S),S*4,S*4);
    // Dark eye sockets
    ctx.fillStyle='#2a1a0a';
    ctx.fillRect(_r(-5*S),_r((by+4+hbob)*S),S,S);
    ctx.fillRect(_r(4*S),_r((by+4+hbob)*S),S,S);
    
    // Nose
    ctx.fillStyle=muscleTone;
    ctx.fillRect(_r(-1*S),_r((by+7+hbob)*S),S*2,S*2);
    
    // Mouth — bared teeth, lipless like titan
    ctx.fillStyle='#1a0a0a';
    ctx.fillRect(_r(-4*S),_r((by+10+hbob)*S),S*8,S*2);
    // Exposed teeth
    ctx.fillStyle='#f0e8dc';
    [-3,-1,1,3].forEach(x=>ctx.fillRect(_r(x*S),_r((by+10+hbob)*S),S,S*2));
    
    // NECK — muscular with visible tendons
    dr(-3,by+12+hbob,3,by+15+hbob,muscleTone);
    ctx.fillStyle='#a85030';
    ctx.fillRect(_r(-2*S),_r((by+12+hbob)*S),S,S*3); // tendon lines
    ctx.fillRect(_r(1*S),_r((by+12+hbob)*S),S,S*3);
    
    // TORSO — exposed muscle, defined abs, no skin
    // Pectorals
    dr(-8,by+15,8,by+20,muscleTone);
    ctx.fillStyle='#b86840';
    ctx.fillRect(_r(-7*S),_r((by+15)*S),S*5,S*3); // left pec
    ctx.fillRect(_r(2*S),_r((by+15)*S),S*5,S*3); // right pec
    // Pec definition line
    ctx.fillStyle='#8a4020';
    ctx.fillRect(_r(-1*S),_r((by+15)*S),S*2,S*5);
    
    // Abs — 6-pack definition
    dr(-6,by+20,6,by+28,muscleTone);
    ctx.fillStyle='#a85030';
    // Vertical ab line
    ctx.fillRect(_r(-1*S),_r((by+20)*S),S*2,S*8);
    // Horizontal ab lines
    ctx.fillRect(_r(-5*S),_r((by+22)*S),S*10,S);
    ctx.fillRect(_r(-5*S),_r((by+25)*S),S*10,S);
    
    // Side obliques
    ctx.fillStyle='#984828';
    ctx.fillRect(_r(-8*S),_r((by+18)*S),S*2,S*8);
    ctx.fillRect(_r(6*S),_r((by+18)*S),S*2,S*8);

    // ARMS
    if(state==='punch'){
      const ae=_r(str*10-fol*3);
      // Punching arm — extended with wind-up
      dr(-9-_r(wu*3),by+15,-7-_r(wu*3),by+22,muscleTone);
      // Fist extends
      dr(6,by+16,8+ae+4,by+19,muscleTone);
      // Fist
      ctx.fillStyle='#c4784a';
      ctx.fillRect(_r((8+ae+2)*S),_r((by+14)*S),S*4,S*6);
      // Impact glow based on animation progress
      if(str>0.2){
        const glowIntensity=0.15+str*0.25;
        ctx.fillStyle=`rgba(136,255,0,${glowIntensity})`;
        ctx.fillRect(_r((6+ae)*S),_r((by+10)*S),_r((ae+8)*S),S*12);
      }
    } else if(state==='kick'){
      // Both arms up for balance
      dr(-10,by+14,-7,by+22,muscleTone);
      dr(7,by+14,10,by+22,muscleTone);
    } else {
      // Idle arms — slightly bent, ready stance
      dr(-10,by+15,-8,by+24,muscleTone);
      dr(8,by+15,10,by+24,muscleTone);
      // Fists
      ctx.fillStyle='#c4784a';
      ctx.fillRect(_r(-11*S),_r((by+22)*S),S*3,S*3);
      ctx.fillRect(_r(8*S),_r((by+22)*S),S*3,S*3);
    }

    // LEGS — muscular thighs
    const legColor='#b86840';
    if(state==='kick'){
      // Standing leg
      dr(-6,by+28,-3,by+36,legColor);
      ctx.fillStyle='#1a0a0a';ctx.fillRect(_r(-7*S),_r((by+36)*S),S*5,S*2);
      // Kicking leg
      const lx=_r(str*10-fol*3),ly=_r(-peak*5);
      dr(1,by+28+ly,2+lx+3,by+30+ly,legColor);
      dr(3+lx,by+28+ly,5+lx,by+35+ly,legColor);
      ctx.fillStyle='#1a0a0a';ctx.fillRect(_r((3+lx)*S),_r((by+35+ly)*S),S*5,S*2);
      // Kick impact glow
      if(peak>0.3){
        ctx.fillStyle=`rgba(136,255,0,${peak*0.25})`;
        ctx.fillRect(_r((3+lx)*S),_r((by+25+ly)*S),S*7,S*10);
      }
    } else {
      const lo=state==='walk'?_r(wc*5):0;
      dr(-6,by+28,-3,by+36+lo,legColor);
      dr(3,by+28,6,by+36-lo,legColor);
      // Feet
      ctx.fillStyle='#1a0a0a';
      ctx.fillRect(_r(-7*S),_r((by+36+lo)*S),S*5,S*2);
      ctx.fillRect(_r(2*S),_r((by+36-lo)*S),S*5,S*2);
    }
    
    // Steam/heat effect around titan
    ctx.globalAlpha=0.08+0.04*Math.sin(t*0.006);
    ctx.fillStyle='#88ff00';
    ctx.fillRect(_r(-14*S),_r((by-4)*S),S*28,S*44);
    ctx.globalAlpha=1;
    
    // Steam particles rising
    if(Math.random()<0.15){
      const sx=(Math.random()-0.5)*20;
      spP&&spP(cx+sx,cy-60-Math.random()*30,'rgba(200,200,180,0.5)',1,1);
    }
    
    ctx.restore();

  } else {
    // BASE FORM
    const skin='#c8a882';
    ctx.save();
    ctx.translate(_r(cx),_r(cy));
    ctx.scale(fac,1);
    const by=-33;
    const lean=(state==='poke'||state==='punch')?_r(str*2):0;
    const hbob=_r(bob);

    // HEAD: wolf cut, glasses
    dr(lean-5,by+hbob,lean+6,by+1+hbob,'#111');
    dr(lean-6,by+2+hbob,lean+7,by+2+hbob,'#111');
    dr(lean-6,by+3+hbob,lean-4,by+4+hbob,'#111');
    dr(lean+5,by+3+hbob,lean+9,by+5+hbob,'#111'); // tufts
    dr(lean-5,by+3+hbob,lean+5,by+9+hbob,skin);
    // glasses
    const gc=stamLow?'#f88':'#88aaff';
    ctx.fillStyle=gc;
    ctx.fillRect(_r((lean-4)*S),_r((by+5+hbob)*S),S*3,S);
    ctx.fillRect(_r((lean+2)*S),_r((by+5+hbob)*S),S*3,S);
    ctx.fillRect(_r((lean-1)*S),_r((by+5+hbob)*S),S,S); // bridge
    ctx.fillStyle='#111';
    ctx.fillRect(_r((lean-3)*S),_r((by+5+hbob)*S),S,S);
    ctx.fillRect(_r((lean+3)*S),_r((by+5+hbob)*S),S,S);
    ctx.fillStyle=stamLow?'#f44':'#555';ctx.fillRect(_r((lean-1)*S),_r((by+8+hbob)*S),S*3,S);
    ctx.fillStyle=skin;ctx.fillRect(_r((lean-1)*S),_r((by+9+hbob)*S),S*3,S);

    // TORSO: white crewneck
    for(let x=-5;x<=5;x++)for(let y=by+10;y<=by+20;y++){
      ctx.fillStyle=x<-2?'#bbb':'#ddd';
      ctx.fillRect(_r((lean+x)*S),_r(y*S),S,S);
    }
    ctx.fillStyle='#ccc';ctx.fillRect(_r((lean-2)*S),_r((by+10)*S),S*4,S); // collar
    ctx.fillStyle='#aaddff';ctx.fillRect(_r((lean-6)*S),_r((by+17)*S),S*2,S*2); // web shooter

    // ARMS
    if(state==='poke'||state==='punch'){
      const wb=_r(wu*3), ae=_r(str*5-fol*1);
      dr(lean-7-wb,by+11,lean-5-wb,by+17,'#ddd');
      ctx.fillStyle=skin;ctx.fillRect(_r((lean-8-wb)*S),_r((by+17)*S),S*2,S*2);
      dr(lean+4,by+12,lean+4+ae+2,by+14,'#ddd');
      ctx.fillStyle=skin;ctx.fillRect(_r((lean+4+ae+2)*S),_r((by+11)*S),S*2,S*2);
      if(str>0.2){ctx.fillStyle=`rgba(170,220,255,${str*0.3})`;ctx.fillRect(_r((lean-7)*S),_r((by+15)*S),S*3,S*4);}
    } else if(state==='inhale'){
      dr(-7,by+11,-5,by+15,'#ddd');ctx.fillStyle=skin;ctx.fillRect(_r(-8*S),_r((by+10)*S),S*2,S*2);
      dr(5,by+11,7,by+15,'#ddd');  ctx.fillStyle=skin;ctx.fillRect(_r(6*S),_r((by+10)*S),S*2,S*2);
      // big open mouth
      dr(lean-3,by+6+hbob,lean+3,by+9+hbob,'#111');
      dr(lean-2,by+7+hbob,lean+2,by+8+hbob,'#4af');
      ctx.fillStyle='rgba(180,220,255,.2)';ctx.fillRect(_r((lean+4)*S),_r((by+4)*S),S*10,S*8);
    } else if(state==='kick'){
      dr(-7,by+11,-5,by+15,'#ddd');ctx.fillStyle=skin;ctx.fillRect(_r(-8*S),_r((by+15)*S),S*2,S*2);
      dr(5,by+11,7,by+15,'#ddd');  ctx.fillStyle=skin;ctx.fillRect(_r(6*S),_r((by+15)*S),S*2,S*2);
    } else {
      const sw=state==='walk'?_r(wc*3):0;
      dr(lean+4,by+11,lean+5,by+16+sw,'#ddd');ctx.fillStyle=skin;ctx.fillRect(_r((lean+4)*S),_r((by+16+sw)*S),S*2,S*2);
      dr(lean-6,by+11,lean-5,by+16-sw,'#ddd');ctx.fillStyle=skin;ctx.fillRect(_r((lean-7)*S),_r((by+16-sw)*S),S*2,S*2);
    }

    // LEGS
    const lc='#334466';
    if(state==='kick'){
      dr(-5,by+21,-3,by+31,lc);ctx.fillStyle='#222';ctx.fillRect(_r(-6*S),_r((by+31)*S),S*4,S*2);
      const lx=_r(str*6-fol*2),ly=_r(-peak*3);
      dr(1,by+21+ly,1+lx+2,by+22+ly,lc);dr(2+lx,by+21+ly,3+lx,by+27+ly,lc);
      ctx.fillStyle='#222';ctx.fillRect(_r((1+lx)*S),_r((by+27+ly)*S),S*4,S*2);
    } else {
      const lo=state==='walk'?_r(wc*4):0;
      dr(-5,by+21,-3,by+31+lo,lc);ctx.fillStyle='#222';ctx.fillRect(_r(-6*S),_r((by+31+lo)*S),S*4,S*2);
      dr(2,by+21,4,by+31-lo,lc);  ctx.fillStyle='#222';ctx.fillRect(_r(1*S),_r((by+31-lo)*S),S*4,S*2);
    }
    if(stamLow){ctx.globalAlpha=0.06;ctx.fillStyle='#f44';ctx.fillRect(_r(-6*S),_r((by)*S),S*13,S*32);ctx.globalAlpha=1;}
    ctx.restore();
  }
}

function drawAmmoHUD(p){
  if(CHARS[p.ci].id!=='maxwell')return;
  if(p.ammo===undefined)return;
  const maxA=p.maxAmmo||6;
  const bw=5,bh=8,gap=3;
  const totalW=maxA*(bw+gap)-gap;
  const startX=Math.round(p.x-totalW/2);
  const startY=Math.round(p.y-108);
  for(let i=0;i<maxA;i++){
    const bx=startX+i*(bw+gap);
    const filled=i<p.ammo;
    if(p.reloading){
      // reload progress — fill from left based on timer
      const prog=1-(p.reloadTimer/120);
      const isRefilled=i<Math.ceil(prog*maxA);
      ctx.fillStyle=isRefilled?'#ffaa22':'#331100';
    } else {
      ctx.fillStyle=filled?(p.piercingRounds?'#44ffee':'#ffdd44'):'#222';
    }
    // bullet icon shape — rectangle with tip
    ctx.fillRect(bx,startY,bw,bh);
    if(filled&&!p.reloading){
      ctx.fillStyle=p.piercingRounds?'rgba(100,255,240,0.5)':'rgba(255,240,100,0.4)';
      ctx.fillRect(bx,startY,bw,3);
      // bullet tip
      ctx.fillStyle=p.piercingRounds?'#88ffee':'#fff';
      ctx.fillRect(bx+1,startY-2,bw-2,2);
    }
  }
  // RELOADING text
  if(p.reloading){
    ctx.fillStyle='#ff8844';
    ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('RELOAD',p.x,startY-5);
  }
}

// Nick's HUD — Tech Tier indicator + Dodge Buff glow
function drawNickHUD(p){
  if(!p||CHARS[p.ci].id!=='nick')return;
  
  const cx=Math.round(p.x);
  const baseY=Math.round(p.y-115);
  
  // ── TECH TIER DISPLAY ──
  const tier=p.techTier||1;
  const meter=p.techMeter||0;
  
  // Tier badge background
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(cx-28,baseY,56,18);
  ctx.strokeStyle=tier>=3?'#00ffaa':tier>=2?'#88ffcc':'#446655';
  ctx.lineWidth=tier>=3?2:1;
  ctx.strokeRect(cx-28,baseY,56,18);
  
  // Tier text
  ctx.fillStyle=tier>=3?'#00ffaa':tier>=2?'#88ffcc':'#88ffcc';
  ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('TECH T'+tier,cx,baseY+8);
  
  // Tech meter bar
  const barW=50,barH=4;
  ctx.fillStyle='#222';
  ctx.fillRect(cx-barW/2,baseY+11,barW,barH);
  const meterCol=tier>=2?'#00ffaa':'#88ffcc';
  ctx.fillStyle=meterCol;
  ctx.fillRect(cx-barW/2,baseY+11,Math.round(barW*(meter/100)),barH);
  // meter glow when near full
  if(meter>80){
    ctx.fillStyle=`rgba(136,255,204,${0.3+0.2*Math.sin(Date.now()*0.01)})`;
    ctx.fillRect(cx-barW/2,baseY+11,Math.round(barW*(meter/100)),barH);
  }
  
  // ── DODGE BUFF INDICATOR ──
  if(p.dodgeBuffed){
    const pulse=0.6+0.4*Math.sin(Date.now()*0.015);
    // Glowing ring around Nick
    ctx.strokeStyle=`rgba(255,238,68,${pulse})`;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.ellipse(cx,p.y-50,28,45,0,0,Math.PI*2);
    ctx.stroke();
    // "EMPOWERED" text
    ctx.fillStyle='#ffee44';
    ctx.font='4px "Press Start 2P"';
    ctx.fillText('EMPOWERED',cx,baseY-6);
    // Timer bar
    const timeLeft=p.dodgeBuffTimer/180;
    ctx.fillStyle='#333';
    ctx.fillRect(cx-20,baseY-3,40,2);
    ctx.fillStyle='#ffee44';
    ctx.fillRect(cx-20,baseY-3,Math.round(40*timeLeft),2);
  }
  
  // ── TRAP COOLDOWN ──
  if(p.trapCd>0){
    const cdPct=1-(p.trapCd/(p._fastTrap?120:240));
    ctx.fillStyle='#333';
    ctx.fillRect(cx+32,baseY+2,4,14);
    ctx.fillStyle='#88ffcc';
    ctx.fillRect(cx+32,baseY+2+Math.round(14*(1-cdPct)),4,Math.round(14*cdPct));
  }
}

function drawSprite(p){
  if(!p||p.ci===undefined||p.ci>=CHARS.length)return;
  if(p.flt>0)ctx.globalAlpha=.35+.5*Math.abs(Math.sin(p.flt*.5));
  const id=CHARS[p.ci].id;
  const cx=Math.round(p.x), cy=Math.round(p.y);
  const ap=p.atkDur>0?Math.max(0,Math.min(1,1-(p.acd/p.atkDur))):0;
  if(id==='dima')     drawDima(cx,cy,p.facing,p.state,p.rageOn,ap);
  else if(id==='nick')    drawNick(cx,cy,p.facing,p.state,ap,p.dodgeBuffed,p.techTier);
  else if(id==='arman')   drawArman(cx,cy,p.facing,p.state,ap,p.ssActive,p.mechActive);
  else if(id==='aidan')   drawAidan(cx,cy,p.facing,p.state,ap);
  else if(id==='maxwell') drawMaxwell(cx,cy,p.facing,p.state,ap);
  else if(id==='maanav')  drawMaanav(cx,cy,p.facing,p.state,p.titan,p.stam<25,ap);

}

function drawPreviewSprite(cx,cy,ci){

}


// ===== PHYSICS =====
function getActivePlats(){
  return STAGES[stg].plat.map((pl,i)=>{
    if(pl.moving){
      if(pl.mvert){
        // vertical movement
        const t=movPlatT*pl.mvspd;
        return{...pl, y:pl.my+Math.sin(t*0.02)*pl.mvrange};
      } else {
        // horizontal movement
        const t=movPlatT*pl.mspd;
        return{...pl, x:pl.mx+Math.sin(t*0.02)*pl.mrange};
      }
    }
    return pl;
  });
}

function phy(p){
  const plats=getActivePlats();
  p.py=p.y;p.vy+=0.78;p.vx*=.82;
  p.y+=p.vy;p.x+=p.vx;
  plats.forEach(pl=>{
    if(p.x>pl.x-pl.w/2-8&&p.x<pl.x+pl.w/2+8&&p.vy>=0&&p.py<=pl.y+4&&p.y>=pl.y){
      p.y=pl.y;p.vy=0;p.ijp=false;
    }
  });
  if(p.y>=GR){p.y=GR;p.vy=0;p.ijp=false;}
  p.x=Math.max(20,Math.min(W-20,p.x));
}

function getHB(p){const b=p.rageOn?1.22:p.titan?2.0:1;const w=36*b,h=96*b;return{x:p.x-w/2,y:p.y-h,w,h};}
function getAB(p){
  const dir=p.facing,r=p.rageOn?80:p.titan?108:54;
  const hb=getHB(p);
  if(p.state==='punch'||p.state==='kick')return{x:dir>0?p.x:p.x-r,y:p.y-hb.h*.65,w:r,h:hb.h*.4};
  if(p.state==='poke')return{x:dir>0?p.x:p.x-46,y:p.y-hb.h*.58,w:46,h:hb.h*.3};
  return null;
}
function ro(a,b){return a&&b&&a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ===== HIT & ROUND =====
function doHit(atk,def,dmg,kb){
  if(def.inv>0)return;

  // PARRY check — successful parry puts it on 10s cooldown
  if(def.parrying&&!def.ijp){
    def.parrySuccess=true;def.parryTimer=0;def.parrying=false;
    def.parryCd=600; // 10 second cooldown after successful parry
    atk.hst=35;atk.bst=0; // stagger attacker
    spP(def.x,def.y-60,'#ffffff',15,6);
    spP(def.x,def.y-50,'#ffee44',10,4);
    ftxt(def.x,def.y-80,'PARRY!','#fff');
    ftxt(def.x,def.y-100,'PERFECT!','#ffee44');
    hitSnd(false);return;
  }

  // BLOCK
  if(def.ibl&&!def.ijp){
    let bdmg=Math.round(dmg*0.08);
    // reflect card
    if(def.reflectActive){
      atk.hp=Math.max(1,atk.hp-Math.round(dmg*0.25));
      ftxt(atk.x,atk.y-80,'REFLECT!','#44aaff');
    }
    def.bst=12;def.hp=Math.max(0,def.hp-bdmg);
    spP(def.x,def.y-50,'#fff',4,2);ftxt(def.x,def.y-80,'BLOCK','#aaa');hitSnd(false);return;
  }

  // ARMOR card
  if(def.armor>0){
    def.armor--;
    spP(def.x,def.y-60,'#aaaaff',8,4);
    ftxt(def.x,def.y-80,'ARMOR!','#aaf');
    def.hst=8;def.flt=8;hitSnd(false);return;
  }

  // Apply defensive buff
  dmg=Math.round(dmg*def.buffDef);
  // Apply offensive buff
  dmg=Math.round(dmg*(atk.buffDmg||1));
  // Last stand
  if(atk.lastStandActive&&atk.hp/atk.maxHp<0.25) dmg=Math.round(dmg*1.5);
  
  // DIMA SPECIAL CHECKS — Tank It and Zesty Taunt
  dmg=checkDimaSpecials(def,dmg);
  
  // Nick's dodge buff — empowered hit bonus
  if(atk.dodgeBuffed&&CHARS[atk.ci].id==='nick'){
    dmg=Math.round(dmg*1.5);
    atk.techMeter=Math.min(100,(atk.techMeter||0)+18);
    atk.techDecay=0;
    atk.dodgeBuffed=false;
    atk.dodgeBuffTimer=0;
    spP(atk.x+atk.facing*30,atk.y-50,'#ffee44',15,6);
    ftxt(atk.x,atk.y-100,'EMPOWERED!','#ffee44');
  }
  
  // Nick's AFTERIMAGE BUFF — +40% damage for 7 seconds after successful afterimage hit
  if(atk.afterimageBuffActive&&CHARS[atk.ci].id==='nick'){
    dmg=Math.round(dmg*1.4);
    spP(atk.x+atk.facing*25,atk.y-45,'#88ffcc',8,4);
  }

  // Hitstun scaling — diminishing returns in combos
  const comboScale=Math.max(0.4,1-atk.comboCount*0.08);
  dmg=Math.max(1,Math.round(dmg*comboScale));
  const scaledKb=kb*comboScale;

  def.hp=Math.max(0,def.hp-dmg);
  def.flt=18;
  
  // Track damage for Nick's shrug ability
  if(CHARS[def.ci].id==='nick'&&def.recentDamage){
    def.recentDamage.push({dmg:dmg,time:Date.now()});
    // Clean up old entries (older than 5 seconds)
    def.recentDamage=def.recentDamage.filter(d=>Date.now()-d.time<5000);
  }

  // Hitstun with scaling
  def.hst=Math.round(22*comboScale);

  // KNOCKBACK + wall splat
  def.vx=atk.facing*scaledKb;
  def.vy=-2.5-scaledKb*0.3;
  // check wall splat
  const nearWall=(def.x<60&&atk.facing<0)||(def.x>W-60&&atk.facing>0);
  if(nearWall&&kb>2){
    def.wallSplatTimer=20;
    def.vx*=0.1; // bounce back
    def.vx=-def.vx*0.5;
    spP(def.x,def.y-60,'#ff8844',8,3);
    ftxt(def.x,def.y-80,'WALL!','#f84');
    hitSnd(true);
  }

  // Combo tracking
  atk.comboCount++;atk.comboTimer=70;
  atk.spm=Math.min(100,atk.spm+10);
  if(CHARS[def.ci].id==='dima'&&!def.rageOn)def.rage=Math.min(100,def.rage+dmg*2.5);

  // Lifesteal
  if(atk.lifesteal>0) atk.hp=Math.min(atk.maxHp,atk.hp+atk.lifesteal);
  // Vampire
  if(atk.vampireHits!==undefined){
    atk.vampireHits++;
    if(atk.vampireHits>=5){atk.hp=Math.min(atk.maxHp,atk.hp+10);atk.vampireHits=0;ftxt(atk.x,atk.y-90,'DRAIN +10','#ff88cc');}
  }
  // Regen (ticked in loop)

  hitSnd(dmg>14);
  spP(def.x,def.y-60,CHARS[atk.ci].color,12,5);
  ftxt(def.x,def.y-105,'-'+Math.round(dmg),dmg>14?'#f44':'#ff4');

  // Combo counter display — scales with combo size
  if(atk.comboCount>=2){
    const comboCol=atk.comboCount>=8?'#ff00ff':atk.comboCount>=5?'#f44':atk.comboCount>=3?'#ff4':'#fff';
    ftxt(atk.x,atk.y-130,atk.comboCount+'x COMBO!',comboCol);
    // Big combos get extra particles
    if(atk.comboCount>=5) spP(def.x,def.y-50,comboCol,atk.comboCount*2,4);
  }
  
  // Screen shake on heavy hits
  if(dmg>12||kb>4){
    window._screenShake=(window._screenShake||0)+Math.min(8,dmg*0.4);
  }

  if(def.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(atk);},1400);gst='ko';}
}

function endRound(w){
  if(w===P1)p1w++;else p2w++;
  // reset per-round mechanics
  window._toxicGround=false;
  window._wind=0;
  window._quakeTimer=0;
  // reset combo counts
  if(P1)P1.comboCount=0;
  if(P2)P2.comboCount=0;
  if(p1w>=2||p2w>=2){
    setTimeout(()=>{SCREEN='over';},400);
  } else {
    rnd++;
    // Loser gets a card
    const loser=w===P1?P2:P1;
    SCREEN='cards';
    setTimeout(()=>startCardScreen(loser),600);
  }
}

// ===== PROJECTILE SYSTEM =====
let allProjs=[];

function spawnProj(owner,x,y,vx,vy,type,color,dmg,life){
  allProjs.push({owner,x,y,vx,vy,type,color,dmg,life,maxLife:life,w:18,h:12,active:true,data:{}});
}

function updateProjs(op1,op2){
  allProjs=allProjs.filter(p=>p.active&&p.life>0);
  allProjs.forEach(proj=>{
    proj.x+=proj.vx;proj.y+=proj.vy;
    if(proj.type==='lob'||proj.type==='impact'||proj.type==='teleport'||proj.type==='flash_nade') proj.vy+=0.55; // weighted grenade gravity
    proj.life--;
    if(proj.x<-30||proj.x>W+30||proj.y>H+50){
      // MISS — if hadouken, reset cooldown
      if(proj.type==='hadouken'&&proj.ownerRef){
        proj.ownerRef.hadoukenCooldown=0;
        ftxt(proj.ownerRef.x,proj.ownerRef.y-90,'MISS — NO CD!','#4488ff');
      } else if(proj.type==='hadouken'&&proj.owner){
        proj.owner.hadoukenCooldown=0;
        ftxt(proj.owner.x,proj.owner.y-90,'MISS — NO CD!','#4488ff');
      }
      proj.active=false;return;
    }
    // projectiles land on ground
    // Ground landing
    if((proj.type==='teleport'||proj.type==='flash_nade')&&proj.y>=GR){
      proj.y=GR;proj.vy=0;proj.vx=0;
      if(proj.type==='teleport')proj.landed=true;
    }
    // Impact grenade lands on ground and explodes
    if(proj.type==='impact'&&proj.vy>0&&proj.y>=GR){
      proj.y=GR;
      // explode on ground impact
      const tgt=proj.owner===op1?op2:op1;
      if(tgt&&tgt.inv<=0){
        const db=getHB(tgt);
        if(Math.abs(proj.x-tgt.x)<(proj.aoeR||70)){
          doHit(proj.owner,tgt,proj.dmg,proj.aoe?8:5);
        }
      }
      spP(proj.x,proj.y,'#ff4400',22,8);
      spP(proj.x,proj.y,'#ffaa00',16,6);
      spP(proj.x,proj.y,'#ffee44',10,4);
      proj.active=false;
    }
    // Impact grenade lands on platforms
    if(proj.type==='impact'&&proj.vy>0){
      getActivePlats().forEach(pl=>{
        const px=pl.x-pl.w/2, py=pl.y;
        if(proj.x>px&&proj.x<px+pl.w&&proj.y>=py&&proj.y<py+14){
          proj.y=py;
          const tgt=proj.owner===op1?op2:op1;
          if(tgt&&tgt.inv<=0){
            const db=getHB(tgt);
            if(Math.abs(proj.x-tgt.x)<(proj.aoeR||70)){
              doHit(proj.owner,tgt,proj.dmg,proj.aoe?8:5);
            }
          }
          spP(proj.x,proj.y,'#ff4400',22,8);
          spP(proj.x,proj.y,'#ffaa00',16,6);
          spP(proj.x,proj.y,'#ffee44',10,4);
          proj.active=false;
        }
      });
    }
    // clamp grenades to map bounds
    if(proj.type==='teleport'||proj.type==='impact'||proj.type==='lob'||proj.type==='flash_nade'){
      if(proj.x<20){proj.x=20;proj.vx=0;}
      if(proj.x>W-20){proj.x=W-20;proj.vx=0;}
    }
    // Hit detection — all damaging projectile types
    const targets=proj.owner===op1?[op2]:[op1];
    targets.forEach(def=>{
      if(def.inv>0||!def)return;
      const db=getHB(def);
      // Proper AABB: use proj center for Y check
      const projCx=proj.x, projCy=proj.y-(proj.h||12)/2;
      const hit=(projCx+proj.w > db.x) &&
                (projCx        < db.x+db.w) &&
                (projCy+(proj.h||12) > db.y) &&
                (projCy              < db.y+db.h);
      if(!hit)return;

      if(proj.type==='impact'||proj.type==='lob'){
        doHit(proj.owner,def,proj.dmg,proj.aoe?8:5);
        // AOE explosion effect
        if(proj.aoe){
          spP(proj.x,proj.y,'#ff4400',22,8);
          spP(proj.x,proj.y,'#ffaa00',16,6);
          spP(proj.x,proj.y,'#ffee44',10,4);
          ftxt(def.x,def.y-90,'BOOM! '+proj.dmg,'#ff4400');
          // shockwave flash
          ctx.fillStyle='rgba(255,100,0,0.25)';
          ctx.beginPath();ctx.arc(proj.x,proj.y,proj.aoeR||60,0,Math.PI*2);ctx.fill();
        } else {
          spP(proj.x,proj.y,'#ffaa00',16,6);
        }
        proj.active=false;

      } else if(proj.type==='bullet'){
        doHit(proj.owner,def,proj.dmg,4);
        def.hst=Math.max(def.hst,12);
        const bc=proj.piercing?'#44ffee':'#ffee88';
        spP(proj.x,def.y-60,bc,8,5);
        ftxt(def.x,def.y-90,proj.piercing?'PIERCE!':'SHOT!',proj.piercing?'#44ffee':'#ffee44');
        if(!proj.piercing) proj.active=false;
        // piercing bullets pass through but lose damage
        else proj.dmg=Math.max(1,proj.dmg-3);

      } else if(proj.type==='hadouken'){
        doHit(proj.owner,def,proj.dmg,proj.ssHadouken?6:4);
        // stun
        if(proj.stunOnHit) def.hst=Math.max(def.hst,proj.stunOnHit);
        spP(proj.x,proj.y,proj.ssHadouken?'#ffcc00':'#4488ff',18,6);
        ftxt(def.x,def.y-100,proj.ssHadouken?'SS HADOUKEN!':'HADOUKEN!',proj.ssHadouken?'#ffcc00':'#44aaff');
        proj.active=false;
        // hadouken HIT = keep cooldown (already set on fire)
      
      } else if(proj.type==='gear'){
        // Nick's thrown gear
        const dmg=proj.dmg;
        const kb=proj.dodgeBoosted?5:3;
        doHit(proj.owner,def,dmg,kb);
        def.hst=Math.max(def.hst,proj.dodgeBoosted?20:14);
        spP(proj.x,def.y-60,proj.dodgeBoosted?'#ffee44':'#88ffcc',12,5);
        ftxt(def.x,def.y-90,proj.dodgeBoosted?'EMPOWERED GEAR!':'GEAR HIT!',proj.dodgeBoosted?'#ffee44':'#88ffcc');
        proj.active=false;
        // Grant tech meter on hit
        if(proj.owner.techMeter!==undefined){
          proj.owner.techMeter=Math.min(100,proj.owner.techMeter+(proj.dodgeBoosted?20:12));
          proj.owner.techDecay=0;
        }
        // Consume dodge buff if active
        if(proj.owner.dodgeBuffed){
          proj.owner.dodgeBuffed=false;
          proj.owner.dodgeBuffTimer=0;
        }
      
      } else if(proj.type==='rocket'){
        // Arman's mech rockets — explode on hit
        doHit(proj.owner,def,proj.dmg,7);
        def.hst=Math.max(def.hst,22);
        // Explosion effect
        spP(proj.x,proj.y,'#ff4400',20,7);
        spP(proj.x,proj.y,'#ffaa00',14,5);
        spP(proj.x,proj.y,'#ffee44',8,3);
        ftxt(def.x,def.y-100,'ROCKET HIT!','#ff4444');
        window._screenShake=(window._screenShake||0)+5;
        proj.active=false;
      }
    });
  });
}

function drawProjs(){
  allProjs.forEach(proj=>{
    ctx.save();
    if(proj.type==='hadouken'){
      // Hadouken beam — blue energy blast
      const pw=proj.power||0.5;
      const len=proj.w||30;
      const h=proj.h||14;
      const alpha=Math.min(1,proj.life/15);
      ctx.globalAlpha=alpha;
      // outer glow
      ctx.fillStyle='rgba(0,100,255,0.3)';
      ctx.fillRect(proj.x-(proj.vx>0?0:len),proj.y-h-4,len+8,h+8);
      // main beam
      ctx.fillStyle=proj.ssHadouken?'#cc8800':'#0055ee';
      ctx.fillRect(proj.x-(proj.vx>0?0:len),proj.y-h,len,h);
      // inner bright core
      ctx.fillStyle=proj.ssHadouken?'#ffdd44':'#44aaff';
      ctx.fillRect(proj.x-(proj.vx>0?2:len-2),proj.y-h+3,len-4,h-6);
      // bright center
      ctx.fillStyle='#ffffff';
      ctx.fillRect(proj.x-(proj.vx>0?4:len-6),proj.y-h/2-2,8,4);
      // energy particles trailing
      if(Math.random()<0.4){
        spP(proj.x-(proj.vx>0?len:0),proj.y-h/2,'#0088ff',2,2);
      }
      ctx.globalAlpha=1;
    } else if(proj.type==='bullet'){
      // gunshot tracer
      ctx.fillStyle='#ffee88';
      ctx.fillRect(proj.x-8,proj.y-2,16,4);
      ctx.fillStyle='#fff';ctx.fillRect(proj.x-3,proj.y-1,6,2);
    } else if(proj.type==='impact'||proj.type==='lob'){
      // grenade
      ctx.fillStyle='#556644';ctx.fillRect(proj.x-5,proj.y-5,10,10);
      ctx.fillStyle='#778855';ctx.fillRect(proj.x-3,proj.y-3,6,6);
      ctx.fillStyle='#ffcc44';ctx.fillRect(proj.x-1,proj.y-7,2,4); // pin
    } else if(proj.type==='teleport'){
      // teleport nade — blue
      ctx.fillStyle='#2244cc';ctx.fillRect(proj.x-5,proj.y-5,10,10);
      ctx.fillStyle='#4488ff';ctx.fillRect(proj.x-3,proj.y-3,6,6);
      ctx.fillStyle='#88aaff';ctx.fillRect(proj.x-1,proj.y-7,2,4);
      // if landed, show portal ring
      if(proj.vy===0){
        ctx.strokeStyle='rgba(100,150,255,0.6)';ctx.lineWidth=2;
        ctx.beginPath();ctx.ellipse(proj.x,proj.y,20,6,0,0,Math.PI*2);ctx.stroke();
      }
    } else if(proj.type==='gear'){
      // Nick's thrown gear — spinning cog
      const spin=Date.now()*0.02;
      ctx.save();
      ctx.translate(proj.x,proj.y);
      ctx.rotate(spin);
      // outer ring
      ctx.fillStyle=proj.dodgeBoosted?'#ffee44':'#88ffcc';
      ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
      // inner hole
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      // teeth
      ctx.fillStyle=proj.dodgeBoosted?'#ffee44':'#88ffcc';
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3;
        ctx.fillRect(Math.cos(a)*6-2,Math.sin(a)*6-2,4,4);
      }
      ctx.restore();
      // glow trail
      if(proj.dodgeBoosted){
        ctx.globalAlpha=0.3;
        ctx.fillStyle='#ffee44';
        ctx.beginPath();ctx.arc(proj.x-proj.vx*0.5,proj.y,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
    } else if(proj.type==='rocket'){
      // Arman's mech rocket — missile with trail
      ctx.save();
      ctx.translate(proj.x,proj.y);
      // Rocket body
      ctx.fillStyle='#444455';
      ctx.fillRect(proj.vx>0?-12:0,-4,12,8);
      // Nose cone
      ctx.fillStyle='#ff4444';
      ctx.beginPath();
      if(proj.vx>0){
        ctx.moveTo(0,-4);ctx.lineTo(6,0);ctx.lineTo(0,4);
      } else {
        ctx.moveTo(0,-4);ctx.lineTo(-6,0);ctx.lineTo(0,4);
      }
      ctx.fill();
      // Fins
      ctx.fillStyle='#666677';
      ctx.fillRect(proj.vx>0?-12:-0,-7,4,3);
      ctx.fillRect(proj.vx>0?-12:-0,4,4,3);
      // Exhaust flame
      ctx.fillStyle='#ffaa44';
      ctx.globalAlpha=0.7+0.3*Math.random();
      const fl=4+Math.random()*6;
      ctx.fillRect(proj.vx>0?-12-fl:12,-3,fl,6);
      ctx.fillStyle='#ffee88';
      ctx.fillRect(proj.vx>0?-12-fl/2:12,-2,fl/2,4);
      ctx.globalAlpha=1;

      // Smoke trail
      if(Math.random()<0.5){
        spP(proj.x-(proj.vx>0?15:-15),proj.y,'#888888',3,2);
      }
    }
    ctx.restore();
  });
}

// Gadget wheel draw
const GADGET_ICONS=['⚡','💥','🔵'];
const GADGET_NAMES=['FLASHBANG','IMPACT GRN','TELE GRN'];
const GADGET_COLORS=['#ffee44','#ff6622','#4488ff'];

function drawGadgetWheel(p){
  if(!p||CHARS[p.ci].id!=='maxwell')return;
  const cx=Math.round(p.x), cy=Math.round(p.y-125);

  // ── EQUIPPED INDICATOR: show above head when not opening wheel ──
  if(!p.gadgetWheelOpen&&p.gadgetEquipped!==null){
    const gi=p.gadgetEquipped;
    const col=GADGET_COLORS[gi];
    // small colored dot with name
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(cx-28,cy+8,56,14);
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.strokeRect(cx-28,cy+8,56,14);
    ctx.fillStyle=col;
    ctx.font='4px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(GADGET_NAMES[gi],cx,cy+17);
    // pulsing dot
    ctx.fillStyle=col;ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()*0.01);
    ctx.beginPath();ctx.arc(cx-22,cy+15,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // cooldown bar if on cooldown
    if(p.gadgetCd>0){
      const cdMax=240;
      const pct=1-(p.gadgetCd/cdMax);
      ctx.fillStyle='#222';ctx.fillRect(cx-26,cy+24,52,4);
      ctx.fillStyle=col;ctx.fillRect(cx-26,cy+24,Math.round(52*pct),4);
    }
    return;
  }

  if(!p.gadgetWheelOpen)return;

  // ── WHEEL: open while holding G ──
  const n=p.gadgets.length;
  const r=36;

  // backdrop
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.beginPath();ctx.arc(cx,cy,r+22,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffdd44';ctx.lineWidth=2;ctx.shadowColor='#ffdd44';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(cx,cy,r+22,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;

  // gadget slots
  for(let i=0;i<n;i++){
    const angle=(i/n)*Math.PI*2-Math.PI/2;
    const nx=Math.round(cx+Math.cos(angle)*r);
    const ny=Math.round(cy+Math.sin(angle)*r);
    const sel=p.gadgetSelected===i;
    const onCd=p.gadgetCd>0;

    // slot bg
    ctx.fillStyle=sel?GADGET_COLORS[i]:(onCd?'rgba(20,20,20,0.9)':'rgba(35,35,45,0.92)');
    ctx.beginPath();ctx.arc(nx,ny,sel?16:13,0,Math.PI*2);ctx.fill();

    // slot border
    ctx.strokeStyle=onCd?'#444':GADGET_COLORS[i];
    ctx.lineWidth=sel?3:1;
    if(sel){ctx.shadowColor=GADGET_COLORS[i];ctx.shadowBlur=10;}
    ctx.beginPath();ctx.arc(nx,ny,sel?16:13,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;

    // label
    ctx.fillStyle=onCd?'#444':'#fff';
    ctx.font=`${sel?6:5}px "Press Start 2P"`;
    ctx.textAlign='center';
    ctx.fillText(GADGET_NAMES[i].split(' ')[0],nx,ny+2);

    // key hint
    const keyHint=p.isP2?['7','8','9'][i]:['1','2','3'][i];
    ctx.fillStyle='#555';ctx.font='4px "Press Start 2P"';
    ctx.fillText('['+keyHint+']',nx,ny+sel?12:10);
  }

  // center: currently highlighted name
  ctx.fillStyle=GADGET_COLORS[p.gadgetSelected];
  ctx.font='5px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText(GADGET_NAMES[p.gadgetSelected],cx,cy);
  ctx.fillStyle='#888';ctx.font='4px "Press Start 2P"';
  ctx.fillText('release G to equip',cx,cy+10);
}

// ===== CONTROLS =====
const B1={l:'a',r:'d',u:'w',p:'f',k:'g',s:'h',e:'e'};
const B2={l:'ArrowLeft',r:'ArrowRight',u:'ArrowUp',p:',',k:'.',s:'/',e:'0'};

function upP(p,op,b){
  p.frame++;
  if(p.comboTimer>0)p.comboTimer--;else p.comboCount=0;
  if(p.flt>0)p.flt--;if(p.inv>0)p.inv--;if(p.acd>0)p.acd--;
  if(p.dashCd>0)p.dashCd--;
  if(p.hadoukenCooldown>0)p.hadoukenCooldown--;
  // parry tick
  if(p.parrying){p.parryTimer--;if(p.parryTimer<=0){p.parrying=false;p.parrySuccess=false;}}
  // wall splat
  if(p.wallSplatTimer>0){p.wallSplatTimer--;if(p.wallSplatTimer===0)p.hst=Math.max(p.hst,25);}
  // regen
  if(p.regen>0&&p.state==='idle'&&!p.ijp&&p.frame%60===0) p.hp=Math.min(p.maxHp,p.hp+p.regen);
  // toxic ground
  if(window._toxicGround&&!p.ijp&&p.y>=GR-5&&p.frame%60===0) p.hp=Math.max(1,p.hp-1);
  // wind
  if(window._wind) p.vx+=(window._wind||0)*0.1;
  // comeback mechanic — at 25% HP
  if(!p.comebackActive&&p.hp/p.maxHp<0.25){
    p.comebackActive=true;
    const cid=CHARS[p.ci].id;
    if(cid==='dima')p.rage=Math.min(100,p.rage+50);
    if(cid==='arman'){p.ssMeter=100;p.spm=100;}
    if(cid==='maanav'&&!p.titan){p.stam=80;}
    if(cid==='maxwell'){p.gadgetCd=0;p.spm=100;}
    if(cid==='aidan'){p.cheeseCount=Math.max(p.cheeseCount,1);}
    if(cid==='nick'){p.spm=100;p.dodgeBuffed=true;p.dodgeBuffTimer=300;p.techMeter=Math.min(100,p.techMeter+50);}
    spP(p.x,p.y-80,'#ff2200',20,6);
    ftxt(p.x,p.y-120,'COMEBACK!','#f44');
  }
  // cheese eating animation
  if(p.eatingCheese){p.eatTimer--;if(p.eatTimer<=0){p.eatingCheese=false;p.state='idle';}}

  if(p.hst>0){p.hst--;phy(p);
    // AIR TECH — press any attack while in hitstun airborne
    if(p.ijp&&!p.airTeched&&(keys[b.p]||keys[b.k])){
      p.airTeched=true;p.hst=0;p.inv=20;
      p.vy=-5;p.vx*=0.3;
      spP(p.x,p.y-50,'#88aaff',8,4);ftxt(p.x,p.y-80,'TECH!','#aaf');
    }
    return;
  }
  if(p.airTeched&&!p.ijp)p.airTeched=false; // reset on landing
  if(p.bst>0){p.bst--;phy(p);return;}

  p.facing=op.x>p.x?1:-1;
  const id=CHARS[p.ci].id;
  p.isP2=(p===P2);

  // PARRY — tap toward+block: parry window = 12 frames
  const towardKey=p.facing>0?b.r:b.l;
  if(keys[towardKey]&&keys[b.k]&&p.acd===0&&!p.parrying&&p.parryTimer===undefined){
    p.parrying=true;
    p.parryTimer=p._bigParry?18:12;
    spP(p.x,p.y-50,'rgba(200,200,255,0.5)',3,2);
  }

  // DASH — double-tap detection using tap count + timestamp
  // Approach: count taps per direction with 300ms window
  const now2=Date.now();
  const dashDist=p._bigDash?140:80;
  if(!p._tapR)p._tapR={n:0,t:0};
  if(!p._tapL)p._tapL={n:0,t:0};

  const rJustPressed=keys[b.r]&&!p._prevKeyR;
  const lJustPressed=keys[b.l]&&!p._prevKeyL;
  p._prevKeyR=keys[b.r];
  p._prevKeyL=keys[b.l];

  // reset tap counter if window expired
  if(now2-p._tapR.t>350)p._tapR.n=0;
  if(now2-p._tapL.t>350)p._tapL.n=0;

  if(rJustPressed){p._tapR.n++;p._tapR.t=now2;}
  if(lJustPressed){p._tapL.n++;p._tapL.t=now2;}

  if(p.dashCd===0&&p.acd===0){
    // AIDAN'S SPECIAL ROLL DASH — can do twice before cooldown
    if(id==='aidan'){
      if(p._tapR.n>=2){
        if(aidanRollDash(p,1))p._tapR.n=0;
      } else if(p._tapL.n>=2){
        if(aidanRollDash(p,-1))p._tapL.n=0;
      }
    } else {
      // Normal dash for other characters
      if(p._tapR.n>=2){
        p.vx=dashDist*0.42;p.dashCd=300;p.inv=10;
        spP(p.x,p.y-40,'#ffffff',8,5);
        spP(p.x-20,p.y-30,'#aaaaff',5,3);
        ftxt(p.x,p.y-70,'DASH!','#fff');
        p._tapR.n=0;
      } else if(p._tapL.n>=2){
        p.vx=-dashDist*0.42;p.dashCd=300;p.inv=10;
        spP(p.x,p.y-40,'#ffffff',8,5);
        spP(p.x+20,p.y-30,'#aaaaff',5,3);
        ftxt(p.x,p.y-70,'DASH!','#fff');
        p._tapL.n=0;
      }
    }
  }

  if(id==='dima')updDima(p,op,b);
  else if(id==='maanav')updMaan(p,op,b);
  else updGen(p,op,b);
  phy(p);
  const inWindow=(p.state==='punch'||p.state==='kick'||p.state==='poke')&&p.atkDur>0&&p.acd<p.atkDur*.85&&p.acd>p.atkDur*.1;
  if(inWindow){
    const ab=getAB(p),db=getHB(op);
    if(ro(ab,db)&&!p._hit){
      const r=p.rageOn,t=p.titan;
      const ss=p.ssActive||false;
      const mult=p._dmgMult||1;
      let dm=r?(p.state==='punch'?19:24):t?22:(p.state==='poke'?5:p.state==='punch'?8:12);
      dm=Math.round(dm*mult);
      let kb=r?6:t?9:(ss?4:2);
      doHit(p,op,dm,kb);p._hit=true;
    }
  }
  if(p.acd===0){p._hit=false;p.atkDur=0;}
}

function updDima(p,op,b){
  // Init new fields
  if(p.zestyCharging===undefined)p.zestyCharging=false;
  if(p.zestyCharge===undefined)p.zestyCharge=0;
  if(p.zestyCd===undefined)p.zestyCd=0;
  if(p.tankingIt===undefined)p.tankingIt=false;
  if(p.tankTimer===undefined)p.tankTimer=0;
  if(p.parryCd===undefined)p.parryCd=0;
  
  // Tick cooldowns
  if(p.zestyCd>0)p.zestyCd--;
  if(p.parryCd>0)p.parryCd--;
  
  if(p.rageOn){p.rageT--;if(p.rageT<=0){p.rageOn=false;setAnn('DIMA CALMS DOWN','#4af');spP(p.x,p.y-60,'#4af',15);}}
  
  const downKey=p.isP2?'ArrowDown':'s';
  const upKey=p.isP2?'ArrowUp':'w';
  const holdingDown=keys[downKey];
  const holdingUp=keys[upKey];
  const forwardKey=p.facing>0?b.r:b.l;
  const holdingForward=keys[forwardKey];
  const backKey=p.facing>0?b.l:b.r;
  const holdingBack=keys[backKey];
  
  const spd=p.rageOn?5.5:3.5;let mv=false;
  if(!p.zestyCharging&&!p.tankingIt){
    if(keys[b.l]){p.x-=spd;mv=true;}
    if(keys[b.r]){p.x+=spd;mv=true;}
  }
  if(!p.ijp&&keys[b.u]&&!p.zestyCharging&&!p.tankingIt){p.vy=p.rageOn?-17:-14;p.ijp=true;}
  
  // ═══ ZESTY CHARGE — E (hold to charge, release for knockback) ═══
  if(keys[b.e]&&!holdingDown&&p.zestyCd===0&&p.acd===0&&!p.rageOn){
    p.zestyCharging=true;
    p.zestyCharge=Math.min(100,p.zestyCharge+1.5); // Slower charge
    p.state='idle';
    // Charging particles
    if(p.zestyCharge>20&&Math.random()<0.3){
      spP(p.x+(Math.random()-0.5)*20,p.y-50,'#ff88cc',2,2);
    }
    // Charge indicators
    if(Math.floor(p.zestyCharge)===25)ftxt(p.x,p.y-90,'hmm...','#ff88cc');
    if(Math.floor(p.zestyCharge)===50)ftxt(p.x,p.y-100,'HMMM...','#ff88cc');
    if(Math.floor(p.zestyCharge)===75)ftxt(p.x,p.y-110,'ZESTY!','#ff44aa');
    if(Math.floor(p.zestyCharge)===100)ftxt(p.x,p.y-120,'MAX ZEST!!!','#ff00aa');
  } else if(p.zestyCharging&&!keys[b.e]){
    // Release — do knockback based on charge (NERFED)
    if(p.zestyCharge>=20){
      const power=p.zestyCharge/100;
      const dmg=Math.round(3+power*9); // 3-12 damage (was 5-20)
      const kb=3+power*6; // 3-9 knockback (was 4-14)
      p.acd=30;
      p.state='punch';
      p.zestyCd=240; // 4s cooldown (was 3s)
      
      // Small dash forward
      p.vx=p.facing*5;
      p.inv=8;
      
      // Hit opponent if close
      if(op&&Math.abs(op.x-p.x)<60&&Math.abs(op.y-p.y)<50&&op.inv<=0){
        op.hp=Math.max(0,op.hp-dmg);
        op.vx=p.facing*kb;
        op.vy=-3-power*3;
        op.hst=15+power*10; // Reduced stun
        op.flt=12;
        spP(op.x,op.y-50,'#ff88cc',12,5);
        ftxt(op.x,op.y-80,'-'+dmg+' ZESTY!','#ff88cc');
        p.rage=Math.min(100,p.rage+dmg*1.5);
        hitSnd(false);
        if(op.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(p);},1400);gst='ko';}
      } else {
        ftxt(p.x+p.facing*40,p.y-80,'MISS!','#888');
      }
      spcSnd();
    }
    p.zestyCharging=false;
    p.zestyCharge=0;
  }
  
  // ═══ TANK IT — Down+E, take 50% damage but 2x rage ═══
  if(holdingDown&&keys[b.e]&&p.acd===0&&!p.rageOn&&!p.zestyCharging){
    p.tankingIt=true;
    p.tankTimer=60; // 1 second
    p.state='idle';
    ftxt(p.x,p.y-80,'TANK IT!','#88ccff');
    spP(p.x,p.y-50,'#aaccff',8,4);
  }
  if(p.tankingIt){
    p.tankTimer--;
    if(p.tankTimer%10===0)spP(p.x,p.y-50,'#88ccff',2,1);
    if(p.tankTimer<=0)p.tankingIt=false;
  }
  
  // BLOCKING/PARRY — G (Up+G = kick)
  const wantsKick=holdingUp&&keys[b.k];
  p.ibl=!p.ijp&&keys[b.k]&&!wantsKick&&p.acd===0&&!p.rageOn&&!p.tankingIt&&!p.zestyCharging;
  
  // Parry window on block press
  if(p.ibl&&!p._wasBlocking&&p.parryCd===0){
    p.parrying=true;
    p.parryTimer=8; // 8 frame parry window
  }
  if(p.parrying){
    p.parryTimer--;
    if(p.parryTimer<=0)p.parrying=false;
  }
  p._wasBlocking=p.ibl;
  
  if(p.acd===0&&!p.tankingIt&&!p.zestyCharging){
    // DIMA DIVE — H (rage full)
    if(keys[b.s]&&p.rage>=100&&!p.rageOn){
      p.rageOn=true;p.rageT=360;p.rage=0;p.inv=30;
      setAnn('DIMA DIVE!!!','#ff2200');spcSnd();spP(p.x,p.y-80,'#ff2200',25,8);ftxt(p.x,p.y-120,'DIMA DIVE!','#f44');
    }
    // KICK — Up+G
    else if(wantsKick){
      p.state='kick';p.acd=p.rageOn?18:26;p.atkDur=p.acd;
    }
    // Movement attack — Fwd+F (shoulder charge)
    else if(holdingForward&&keys[b.p]){
      p.state='punch';p.acd=p.rageOn?14:20;p.atkDur=p.acd;
      p.vx=p.facing*6;
    }
    // Basic punch — F
    else if(keys[b.p]&&!holdingDown){
      p.state='punch';p.acd=p.rageOn?16:22;p.atkDur=p.acd;
    }
    else p.state=p.ijp?'jump':mv?'walk':'idle';
  } else if(p.acd<3&&!p.tankingIt&&!p.zestyCharging)p.state=p.ijp?'jump':'idle';
}

// Hook for Dima's Tank It and Taunt in doHit
function checkDimaSpecials(def,dmg){
  if(CHARS[def.ci].id==='dima'){
    // Tank It — 50% damage, 2x rage
    if(def.tankingIt){
      dmg=Math.round(dmg*0.5);
      def.rage=Math.min(100,def.rage+dmg*5); // 2x rage gain
      ftxt(def.x,def.y-100,'TANKED!','#88ccff');
      spP(def.x,def.y-50,'#88ccff',10,4);

      spP(def.x,def.y-60,'#ff2200',20,7);

}

function updMaan(p,op,b){
  // Init new fields
  if(p.sneezeCharge===undefined)p.sneezeCharge=0;
  if(p.sneezeCharging===undefined)p.sneezeCharging=false;
  if(p.sneezeCd===undefined)p.sneezeCd=0;
  if(p.titanCharge===undefined)p.titanCharge=0;
  if(p.titanCharging===undefined)p.titanCharging=false;
  if(p.smiteCd===undefined)p.smiteCd=0;
  if(p.parryCd===undefined)p.parryCd=0;
  // Stamina is now SEPARATE from SP meter - tiredness bar
  if(p.tiredness===undefined)p.tiredness=100; // starts full
  
  if(p.titan){p.titanT--;if(p.titanT<=0){p.titan=false;p.tiredness=8;p.titanCharge=0;setAnn('TITAN FADES...','#aaa');}}
  if(p.wcd>0)p.wcd--;if(p.icd>0)p.icd--;if(p.sneezeCd>0)p.sneezeCd--;
  if(p.smiteCd>0)p.smiteCd--;
  if(p.parryCd>0)p.parryCd--;
  
  const mvKeys=keys[b.l]||keys[b.r];
  // Tiredness regens when idle (separate from SP which builds from combat)
  if(!mvKeys&&!p.ijp&&p.acd===0&&!p.titan&&!p.sneezeCharging)p.tiredness=Math.min(100,p.tiredness+0.8);
  // SP builds from attacking (like other characters)
  if(p.acd===0&&!p.ibl)p.spm=Math.min(100,p.spm+0.08);
  // Sync stam with tiredness for HUD display
  p.stam=p.tiredness;
  
  const spd=p.titan?5.5:3.5,ok=p.tiredness>5||p.titan;
  
  // Movement (slower while charging)
  const moveMult=p.sneezeCharging?0.3:(p.titanCharging?0.5:1);
  let mv=false;
  if(keys[b.l]){p.x-=spd*moveMult;mv=true;if(!p.titan)p.tiredness=Math.max(0,p.tiredness-0.15);}
  if(keys[b.r]){p.x+=spd*moveMult;mv=true;if(!p.titan)p.tiredness=Math.max(0,p.tiredness-0.15);}
  if(!p.ijp&&keys[b.u]&&ok&&!p.sneezeCharging&&!p.titanCharging){
    p.vy=p.titan?-18:-14;p.ijp=true;if(!p.titan)p.tiredness=Math.max(0,p.tiredness-12);
  }
  
  const downKey=p.isP2?'ArrowDown':'s';
  const upKey=p.isP2?'ArrowUp':'w';
  const holdingDown=keys[downKey];
  const holdingUp=keys[upKey];
  const holdingPunch=keys[b.p];
  const forwardKey=p.facing>0?b.r:b.l;
  const holdingForward=keys[forwardKey];
  
  // BLOCKING/PARRY — G (Up+G = kick)
  const wantsKick=holdingUp&&keys[b.k];
  p.ibl=!p.ijp&&keys[b.k]&&!wantsKick&&p.acd===0&&!p.sneezeCharging&&!p.titanCharging;
  
  // Parry window
  if(p.ibl&&!p._wasBlocking&&p.parryCd===0){
    p.parrying=true;
    p.parryTimer=8;
  }
  if(p.parrying){
    p.parryTimer--;
    if(p.parryTimer<=0)p.parrying=false;
  }
  p._wasBlocking=p.ibl;
  
  // ═══════════════════════════════════════════════════════
  // CHARGE SNEEZE — hold Down+F to charge, release to blast
  // ═══════════════════════════════════════════════════════
  if(holdingDown&&holdingPunch&&!p.titan&&p.sneezeCd===0&&p.acd===0){
    p.sneezeCharging=true;
    p.sneezeCharge=Math.min(100,p.sneezeCharge+2.5);
    p.state='idle';
    if(p.sneezeCharge>20&&Math.random()<0.3){
      spP(p.x+p.facing*8,p.y-55,'#aaddff',2,1);
    }
    if(p.sneezeCharge>=25&&p.sneezeCharge<27)ftxt(p.x-15,p.y-95,'AH...','#adf');
    if(p.sneezeCharge>=50&&p.sneezeCharge<52)ftxt(p.x+10,p.y-115,'AH...','#8cf');
    if(p.sneezeCharge>=75&&p.sneezeCharge<77)ftxt(p.x-5,p.y-135,'AHHH...','#6af');
    if(p.sneezeCharge>=95)ftxt(p.x,p.y-155,'AHHHH!!!','#4cf');
  } else if(p.sneezeCharging&&(!holdingPunch||!holdingDown)){
    if(p.sneezeCharge>=30){
      const power=p.sneezeCharge/100;
      const dmg=Math.round(8+power*18);
      const range=80+power*80;
      const knockback=4+power*6;
      p.sneezeCd=120;p.acd=30;p.atkDur=30;p.state='punch';
      p.vx=-p.facing*(6+power*8);p.vy=-3;
      spawnSneezeCloud(p.x+p.facing*30,p.y-50,p,power,range);
      if(op&&op.inv<=0&&!op.ibl){
        const dist=Math.abs(op.x-p.x);
        const inFront=(p.facing>0&&op.x>p.x)||(p.facing<0&&op.x<p.x);
        if(dist<range&&inFront){
          op.hp=Math.max(0,op.hp-dmg);op.vx=p.facing*knockback;op.vy=-4;op.hst=25;op.flt=20;
          spP(op.x,op.y-50,'#88ccff',15,6);ftxt(op.x,op.y-90,'-'+dmg+' ACHOO!','#88ccff');hitSnd(true);
          if(op.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(p);},1400);gst='ko';}
        }
      }
      spP(p.x+p.facing*40,p.y-50,'#aaddff',25,8);ftxt(p.x,p.y-110,'ACHOOOO!!!','#88ccff');spcSnd();
    }
    p.sneezeCharging=false;p.sneezeCharge=0;
  }
  
  // ═══════════════════════════════════════════════════════
  // TITAN WIND-UP PUNCH — hold F to charge, release to smash
  // ═══════════════════════════════════════════════════════
  if(p.titan&&holdingPunch&&!holdingDown&&p.acd===0){
    p.titanCharging=true;p.titanCharge=Math.min(100,p.titanCharge+1.8);p.state='idle';
    if(p.titanCharge>30){
      const intensity=p.titanCharge/100;
      if(Math.random()<intensity*0.4)spP(p.x+p.facing*(15+intensity*10),p.y-55,'#88ff00',2+intensity*3,2);
    }
    if(p.titanCharge>=100)ftxt(p.x,p.y-120,'MAX POWER!','#88ff00');
  } else if(p.titanCharging&&!holdingPunch){
    const power=Math.max(0.2,p.titanCharge/100);
    const dmg=Math.round(12+power*28);
    const kb=5+power*10;
    p.state='punch';p.acd=Math.round(24+power*16);p.atkDur=p.acd;
    if(op&&op.inv<=0){
      const dist=Math.abs(op.x-p.x);const yDist=Math.abs((op.y-50)-(p.y-50));
      const inFront=(p.facing>0&&op.x>p.x)||(p.facing<0&&op.x<p.x);const range=70+power*40;
      if(dist<range&&yDist<70&&inFront){
        if(op.ibl){
          const chipDmg=Math.round(dmg*0.2);op.hp=Math.max(0,op.hp-chipDmg);op.vx=p.facing*kb*0.3;
          spP(op.x,op.y-50,'#ffffff',10,4);ftxt(op.x,op.y-80,'CHIP -'+chipDmg,'#888');hitSnd(false);
        } else {
          op.hp=Math.max(0,op.hp-dmg);op.vx=p.facing*kb;op.vy=-5-power*5;op.hst=Math.round(30+power*20);op.flt=25;
          spP(op.x,op.y-50,'#88ff00',20+power*15,7);ftxt(op.x,op.y-100,'-'+dmg+' SMASH!','#88ff00');hitSnd(true);
          if(power>0.6)window._screenShake=(window._screenShake||0)+power*12;
        }
        if(op.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(p);},1400);gst='ko';}
      }
    }
    if(power>0.7){setAnn('TITAN SMASH!!!','#88ff00');spP(p.x+p.facing*50,p.y-60,'#88ff00',30,9);}
    spcSnd();p.titanCharging=false;p.titanCharge=0;
  }
  
  if(p.acd===0&&!p.sneezeCharging&&!p.titanCharging){
    // ═══ SMITE — E key, lightning bolt strike ═══
    if(keys[b.e]&&p.smiteCd===0&&!holdingDown){
      p.smiteCd=240; // 4s cooldown
      p.acd=25;
      p.state='punch';
      const strikeX=p.x+p.facing*80; // Strike in front
      // Spawn lightning bolt
      spawnLightningBolt(strikeX,p);
      ftxt(p.x,p.y-90,'SMITE!','#ffee44');
      spcSnd();
    }
    // ═══ Down+E — Web Trap (movement special) ═══
    else if(holdingDown&&keys[b.e]&&p.tiredness>20&&!p.ijp){
      p.tiredness=Math.max(0,p.tiredness-20);
      p.acd=30;
      // Spawn web puddle that slows
      spawnWebTrap(p.x,p.y,p);
      ftxt(p.x,p.y-90,'WEB TRAP!','#aaddff');
    }
    // ATTACK TITAN — H only when SP 100
    else if(keys[b.s]&&p.spm>=100&&!p.titan){
      p.titan=true;p.titanT=360;p.spm=0;p.inv=25;
      setAnn('ATTACK TITAN!!!','#88ff00');spcSnd();spP(p.x,p.y-80,'#88ff00',28,8);ftxt(p.x,p.y-130,'TITAN FORM!','#8f0');
    }
    // KICK — Up+G
    else if(wantsKick){
      p.state='kick';p.acd=p.titan?24:22;p.atkDur=p.acd;
    }
    // Movement attack — Fwd+F (web swing punch)
    else if(holdingForward&&keys[b.p]&&p.wcd===0&&ok){
      p.wcd=90;p.vy=-10;p.vx=p.facing*12;p.ijp=true;
      p.state='punch';p.acd=20;p.atkDur=20;
      ftxt(p.x,p.y-80,'WEB STRIKE!','#adf');spcSnd();
    }
    // Basic poke — F
    else if(keys[b.p]&&ok&&!p.titan&&!holdingDown&&!holdingForward){
      p.state='poke';p.acd=16;p.atkDur=16;
      p.tiredness=Math.max(0,p.tiredness-6);
    }
    else p.state=p.ijp?'jump':mv?'walk':'idle';
  } else if(p.acd<3&&!p.sneezeCharging&&!p.titanCharging){
    p.state=p.ijp?'jump':'idle';
  }
}

// ═══ LIGHTNING BOLT SYSTEM (Maanav Smite) ═══
let lightningBolts=[];
function spawnLightningBolt(x,owner){
  lightningBolts.push({x,y:0,owner,life:30,maxLife:30,hit:false});
  spP(x,50,'#ffee44',15,6);
  spP(x,150,'#ffffff',10,4);
}
function updateLightningBolts(P1,P2){
  lightningBolts=lightningBolts.filter(b=>b.life>0);
  lightningBolts.forEach(bolt=>{
    bolt.life--;
    // Hit check on first few frames
    if(bolt.life>20&&!bolt.hit){
      [P1,P2].forEach(p=>{
        if(p&&p!==bolt.owner&&p.inv<=0){
          const dist=Math.abs(p.x-bolt.x);
          if(dist<40){
            const dmg=18;
            p.hp=Math.max(0,p.hp-dmg);
            p.hst=30;p.flt=20;p.vy=-8;
            spP(p.x,p.y-50,'#ffee44',20,7);
            ftxt(p.x,p.y-90,'-'+dmg+' ZAPPED!','#ffee44');
            hitSnd(true);
            bolt.hit=true;
            if(p.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(bolt.owner);},1400);gst='ko';}
          }
        }
      });
    }
  });
}
function drawLightningBolts(){
  lightningBolts.forEach(bolt=>{
    const a=bolt.life/bolt.maxLife;
    ctx.globalAlpha=a;
    ctx.strokeStyle='#ffee44';
    ctx.lineWidth=4+Math.random()*4;
    ctx.beginPath();
    // Jagged lightning from top to ground
    let y=0;
    ctx.moveTo(bolt.x+Math.random()*10-5,y);
    while(y<GR){
      y+=20+Math.random()*30;
      ctx.lineTo(bolt.x+Math.random()*30-15,Math.min(y,GR));
    }
    ctx.stroke();
    // Glow
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.globalAlpha=1;
  });
}

// ═══ WEB TRAP SYSTEM ═══
let webTraps=[];
function spawnWebTrap(x,y,owner){
  webTraps.push({x,y:GR,owner,life:360,maxLife:360,r:50}); // 6 seconds
  spP(x,GR-10,'#aaddff',10,4);
}
function updateWebTraps(P1,P2){
  webTraps=webTraps.filter(t=>t.life>0);
  webTraps.forEach(trap=>{
    trap.life--;
    [P1,P2].forEach(p=>{
      if(p&&p!==trap.owner){
        const dist=Math.abs(p.x-trap.x);
        if(dist<trap.r&&p.y>=GR-10){
          p._slowed=true;
          p._slowTimer=20;
        }
      }
    });
  });
}
function drawWebTraps(){
  webTraps.forEach(trap=>{
    const a=(trap.life/trap.maxLife)*0.5;
    ctx.globalAlpha=a;
    ctx.fillStyle='#aaddff';
    ctx.beginPath();ctx.ellipse(trap.x,GR,trap.r,8,0,0,Math.PI*2);ctx.fill();
    // Web pattern
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=1;
    for(let i=0;i<6;i++){
      const angle=i*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(trap.x,GR);
      ctx.lineTo(trap.x+Math.cos(angle)*trap.r,GR+Math.sin(angle)*8);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  });
}

// ═══ SNEEZE CLOUD SYSTEM ═══
let sneezeClouds=[];
function spawnSneezeCloud(x,y,owner,power,range){
  sneezeClouds.push({
    x,y,owner,power,range,
    life:90+power*60, // 1.5-2.5 seconds
    maxLife:90+power*60,
    dmgTick:0
  });
}
function updateSneezeClouds(P1,P2){
  sneezeClouds=sneezeClouds.filter(c=>c.life>0);
  sneezeClouds.forEach(c=>{
    c.life--;
    c.x+=c.owner.facing*2; // cloud drifts forward
    c.dmgTick++;
    // Damage over time every 20 frames
    if(c.dmgTick>=20){
      c.dmgTick=0;
      [P1,P2].forEach(p=>{
        if(p&&p!==c.owner&&p.inv<=0){
          const dist=Math.abs(p.x-c.x);
          const yDist=Math.abs((p.y-50)-c.y);
          if(dist<c.range*0.6&&yDist<60){
            const dotDmg=Math.round(3+c.power*4);
            p.hp=Math.max(0,p.hp-dotDmg);
            p.flt=8;
            spP(p.x,p.y-50,'#88ccff',4,2);
            ftxt(p.x,p.y-70,'-'+dotDmg,'#adf');
            if(p.hp<=0){slowmo=true;smT=90;setTimeout(()=>{koSnd();stopFightMusic();endRound(c.owner);},1400);gst='ko';}
          }
        }
      });
    }
  });
}
function drawSneezeClouds(){
  sneezeClouds.forEach(c=>{
    const alpha=(c.life/c.maxLife)*0.5;
    const pulse=0.8+0.2*Math.sin(Date.now()*0.01);
    ctx.globalAlpha=alpha*pulse;
    // Misty cloud effect
    ctx.fillStyle='#aaddff';
    for(let i=0;i<5;i++){
      const ox=(Math.sin(Date.now()*0.005+i)*10);
      const oy=(Math.cos(Date.now()*0.007+i)*8);
      const r=c.range*0.3*(0.5+i*0.15);
      ctx.beginPath();
      ctx.arc(c.x+ox,c.y+oy,r,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  });
}
