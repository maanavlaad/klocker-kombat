    document.getElementById('p2m2wrap').style.display='none';
  }
  
  document.getElementById('p1b').textContent=(()=>{
    if(c1.id==='dima') return P1.rageOn?'RAGE MODE':'RAGE: '+Math.floor(P1.rage)+'%';
    if(c1.id==='maanav') return P1.titan?'TITAN MODE':'STAM:'+Math.floor(P1.stam)+'% SP:'+Math.floor(P1.spm)+'%';
    if(c1.id==='arman'){
      if(P1.mechActive) return 'MECH: '+Math.ceil(P1.mechTimer/60)+'s';
      if(P1.ssActive) return 'SS: '+Math.ceil(P1.ssTimer/60)+'s';
      if(P1.ssCharging) return 'CHARGE: '+Math.floor(P1.ssMeter)+'%';
      if(P1.hadoukenCharge>0) return 'HADOUKEN: '+Math.floor(P1.hadoukenCharge)+'%';
    }
    if(c1.id==='nick'){
      if(P1.afterimageBuffActive) return 'SHADOW SYNC! '+Math.ceil(P1.afterimageBuffTimer/60)+'s';
      if(P1.dodgeBuffed) return 'EMPOWERED!';
      return 'TECH T'+P1.techTier+' ('+Math.floor(P1.techMeter)+'%)';
    }
    return 'SP: '+Math.floor(P1.spm)+'%';
  })();
  document.getElementById('p2b').textContent=(()=>{
    if(c2.id==='dima') return P2.rageOn?'RAGE MODE':'RAGE: '+Math.floor(P2.rage)+'%';
    if(c2.id==='maanav') return P2.titan?'TITAN MODE':'STAM:'+Math.floor(P2.stam)+'% SP:'+Math.floor(P2.spm)+'%';
    if(c2.id==='arman'){
      if(P2.mechActive) return 'MECH: '+Math.ceil(P2.mechTimer/60)+'s';
      if(P2.ssActive) return 'SS: '+Math.ceil(P2.ssTimer/60)+'s';
      if(P2.ssCharging) return 'CHARGE: '+Math.floor(P2.ssMeter)+'%';
      if(P2.hadoukenCharge>0) return 'HADOUKEN: '+Math.floor(P2.hadoukenCharge)+'%';

}

//

//
// HOW IT WORKS:
// Both players run the full game simulation locally.
// Every frame, you send your key state to Ably.
// Opponent's key state arrives and fills remoteKeys{}.
// Each player's local inputs are delayed 2 frames (33ms)
// so both sides stay in lockstep even with network jitter.
// ═══════════════════════════════════════════════════════

const KK_ABLY_KEY = 'UjQMtw.3rv2nQ:8B2Xnf4hge9nItJa15TADj6UlDpS4AR_gv0td3_7oJw';
const KK_CHANNEL  = 'klocker-kombat-v1';

// ── STATE ─────────────────────────────────────────────
const net = {
  enabled:    false,       // true when in online match
  connected:  false,
  isP1:       true,        // am I P1 or P2 in this session
  myName:     '',
  oppName:    '',
  roomCode:   '',
  status:     'idle',      // idle|connecting|lobby|countdown|fighting
  ablyClient: null,
  channel:    null,
  onlinePlayers: {},
  // 2-frame input delay buffers
  INPUT_DELAY: 2,
  localBuf:   [],          // ring buffer of my past key states
  remoteBuf:  [],          // ring buffer of opponent's key states
  remoteKeys: {},          // current frame's opponent keys (after delay)
  frameNum:   0,
  lastSent:   0,
  pingMs:     0,
};

// Keys sent over network (only what the game reads via B1/B2)
const NET_KEYS = ['a','d','w','s','f','g','h','e',
                  'ArrowLeft','ArrowRight','ArrowUp','ArrowDown',
                  ',','.','/','\0','0'];

function netKeysSnapshot() {
  const snap = {};
  NET_KEYS.forEach(k => { if(keys[k]) snap[k] = true; });
  return snap;
}

// ── CONNECT ───────────────────────────────────────────
function netConnect(name, roomCode, asP1) {
  if (!KK_ABLY_KEY || KK_ABLY_KEY.length < 20 || !KK_ABLY_KEY.includes(':')) {
    netSetStatus('❌ Add your Ably key first!'); return;
  }
  // Sanitize name for use as Ably clientId (alphanumeric + _ -)
  net.myName   = name.replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,12);
  net.roomCode = roomCode.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,8);
  net.isP1     = asP1;
  net.status   = 'connecting';
  netSetStatus('⏳ Loading Ably SDK...');

  // Check if already loaded
  if (typeof Ably !== 'undefined') { netInit(); return; }

  const script = document.createElement('script');
  script.src = 'https://cdn.ably.com/lib/ably.min-1.js';
  script.onload = () => { netSetStatus('⏳ Connecting...'); netInit(); };
  script.onerror = () => {
    // Try alternate CDN
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/ably@1/ably.min.js';
    s2.onload = () => { netSetStatus('⏳ Connecting...'); netInit(); };
    s2.onerror = () => netSetStatus('❌ Failed to load Ably SDK. Check internet connection.');
    document.head.appendChild(s2);
  };
  document.head.appendChild(script);
}

function netInit() {
  try {
    // clientId must be alphanumeric only — strip everything else
    const safeId = net.myName.replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,20) + '_' + Math.floor(Math.random()*9000+1000);
    net.myName = safeId;

    net.ablyClient = new Ably.Realtime({
      key: KK_ABLY_KEY,
      clientId: safeId,
      closeOnUnload: true,
    });

    net.ablyClient.connection.on('connected', () => {
      net.connected = true;
      net.channel = net.ablyClient.channels.get(`${KK_CHANNEL}-${net.roomCode}`);
      net.channel.subscribe(onNetMessage);
      net.channel.presence.enter({ name: net.myName, isP1: net.isP1 });
      net.channel.presence.subscribe(onPresence);
      net.channel.presence.get((err, members) => {
        if (!err) members.forEach(m => { if (m.clientId !== net.myName) {
          net.onlinePlayers[m.clientId] = m.data;
          net.oppName = m.clientId;
        }});
        updateOnlineLobby();
      });
      net.status = 'lobby';
      netSetStatus(`✅ In room ${net.roomCode} — waiting for opponent...`);
      setInterval(()=>{ if(net.connected) netSend('ping',{t:Date.now()}); }, 3000);
    });

    net.ablyClient.connection.on('failed', (stateChange) => {
      const reason = stateChange?.reason?.message || 'unknown error';
      netSetStatus('❌ Connection failed: ' + reason);
      console.error('[NET] Connection failed:', stateChange);
    });

    net.ablyClient.connection.on('suspended', () => netSetStatus('⚠️ Connection suspended — retrying...'));
    net.ablyClient.connection.on('disconnected', (stateChange) => {
      net.connected = false;
      const reason = stateChange?.reason?.message || '';
      netSetStatus('🔴 Disconnected' + (reason ? ': ' + reason : ''));
    });

  } catch(e) {
    netSetStatus('❌ Error: ' + e.message);
    console.error('[NET] Init error:', e);
  }
}

function netDisconnect() {
  if (net.channel) try { net.channel.presence.leave(); } catch(e) {}
  if (net.ablyClient) try { net.ablyClient.close(); } catch(e) {}
  net.connected = false; net.enabled = false; net.status = 'idle';
  net.onlinePlayers = {}; net.oppName = '';
}

// ── PRESENCE ──────────────────────────────────────────
function onPresence(msg) {
  if (msg.clientId === net.myName) return;
  if (msg.action === 'enter' || msg.action === 'update') {
    net.onlinePlayers[msg.clientId] = msg.data;
    net.oppName = msg.clientId;
    // Both players present → start CS
    const count = Object.keys(net.onlinePlayers).length;
    if (count >= 1 && net.status === 'lobby') {
      netSetStatus(`⚔️ ${net.oppName} joined! Starting in 2s...`);
      setTimeout(() => netStartMatch(), 2000);
    }
  } else if (msg.action === 'leave') {
    delete net.onlinePlayers[msg.clientId];
    if (msg.clientId === net.oppName) {
      net.oppName = '';
      netSetStatus('⚠️ Opponent disconnected!');
    }
  }
  updateOnlineLobby();
}

function netStartMatch() {
  net.status   = 'fighting';
  net.enabled  = true;
  net.frameNum = 0;
  net.localBuf = [];
  net.remoteBuf = [];
  net.remoteKeys = {};
  stopMusic();
  SCREEN = 'cs';
  // Override which player controls which character
  // net.isP1 → controls P1 (B1 keys), opponent drives P2 via remoteKeys
  selSnd();
}

// ── MESSAGE HANDLER ───────────────────────────────────
function onNetMessage(msg) {
  const { type, from, data } = msg.data || {};
  if (from === net.myName) return;

  if (type === 'keys') {
    // Buffer incoming input with frame number
    net.remoteBuf.push({ frame: data.frame, keys: data.keys });
    // Keep buffer tidy
    if (net.remoteBuf.length > 10) net.remoteBuf.shift();
  } else if (type === 'ping') {
    netSend('pong', { t: data.t });
  } else if (type === 'pong') {
    net.pingMs = Date.now() - data.t;
  } else if (type === 'round_end') {
    // Sync round result to avoid desync on KO detection
    if (data.winner === 'p1') { if(!P1||!P2) return; P2.hp = 0; }
    else { if(!P1||!P2) return; P1.hp = 0; }
  } else if (type === 'cs_pick') {
    // Opponent locked in their character — auto-confirm their slot
    if (net.isP1) { p2ci = data.ci; csc.p2 = true; cfmSnd(); }
    else           { p1ci = data.ci; csc.p1 = true; cfmSnd(); }
    if(csc.p1&&csc.p2) setTimeout(()=>{SCREEN='ss';},350);
  } else if (type === 'ss_pick') {
    if (net.isP1) { p2sv = data.sv; ssc.p2 = true; cfmSnd(); }
    else           { p1sv = data.sv; ssc.p1 = true; cfmSnd(); }
    if(ssc.p1&&ssc.p2){
      if(p1sv===99&&p2sv===99) stg=Math.floor(Math.random()*STAGES.length);
      else if(p1sv===99) stg=p2sv;
      else if(p2sv===99) stg=p1sv;
      else stg=p1sv===p2sv?p1sv:Math.random()<.5?p1sv:p2sv;
      setTimeout(()=>beginCountdown(),350);
    }
  }
}

function netSend(type, data) {
  if (!net.channel || !net.connected) return;
  net.channel.publish('game', { type, from: net.myName, data });
}

// ── INPUT SYNC TICK (called every game frame) ─────────
function netTick() {
  if (!net.enabled || !net.connected) return;
  net.frameNum++;

  // 1. Snapshot and buffer my local keys
  const snap = netKeysSnapshot();
  net.localBuf.push({ frame: net.frameNum, keys: snap });
  if (net.localBuf.length > net.INPUT_DELAY + 4) net.localBuf.shift();

  // 2. Send my keys every frame (throttle to ~60fps max)
  const now = performance.now();
  if (now - net.lastSent >= 14) {   // ~70/s cap
    netSend('keys', { frame: net.frameNum, keys: snap });
    net.lastSent = now;
  }

  // 3. Apply opponent's delayed input (INPUT_DELAY frames behind)
  const targetFrame = net.frameNum - net.INPUT_DELAY;
  const remoteFrame = net.remoteBuf.find(f => f.frame === targetFrame)
                   || net.remoteBuf[0];   // fallback: use oldest available
  if (remoteFrame) net.remoteKeys = remoteFrame.keys;

  // 4. My local controls also get the delay
  const localFrame = net.localBuf.find(f => f.frame === targetFrame);
  if (localFrame) net._delayedLocalKeys = localFrame.keys;
  else net._delayedLocalKeys = snap;  // fallback: immediate
}

// Returns the effective keys object for a given binding set
// In online mode: local player uses delayed local keys, remote uses remoteKeys
function getEffectiveKeys(isLocalPlayer) {
  if (!net.enabled) return keys;  // local mode: raw keys
  if (isLocalPlayer) return net._delayedLocalKeys || keys;
  return net.remoteKeys;
}

function netSetStatus(s) { netStatusLabel = s; console.log('[NET]', s); }
function updateOnlineLobby() { /* triggers re-render automatically via loop */ }

// Handle online screen keyboard / mouse input
window.addEventListener('keydown', e => {
  if (SCREEN !== 'online') return;

  if (e.key === 'Escape') {
    netDisconnect();
    SCREEN = 'title'; startMusic(); return;
  }

  if (_onlineScreen.step === 'form') {
    if (e.key === 'Tab') {
      e.preventDefault();
      _onlineScreen.inputFocus = _onlineScreen.inputFocus === 'name' ? 'room' : 'name';
      return;
    }
    if (e.key === '1') { _onlineScreen.role = 'p1'; selSnd(); return; }
    if (e.key === '2') { _onlineScreen.role = 'p2'; selSnd(); return; }

    const field = _onlineScreen.inputFocus;
    if (e.key === 'Backspace') {
      if (field === 'name') _onlineScreen.nameInput = _onlineScreen.nameInput.slice(0,-1);
      else _onlineScreen.roomInput = _onlineScreen.roomInput.slice(0,-1);
      return;
    }
    if (e.key === 'Enter') {
      doNetConnect(); return;
    }
    if (e.key.length === 1) {
      if (field === 'name' && _onlineScreen.nameInput.length < 12)
        _onlineScreen.nameInput += e.key.toUpperCase();
      else if (field === 'room' && _onlineScreen.roomInput.length < 8)
        _onlineScreen.roomInput += e.key.toUpperCase();
    }
  }
}, true);  // capture phase so it runs before global keydown

C.addEventListener('click', e => {
  if (SCREEN !== 'online' || _onlineScreen.step !== 'form') return;
  const r = C.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(W/r.width);
  const my = (e.clientY-r.top)*(H/r.height);

  // Click name field
  if (mx >= W/2-180 && mx <= W/2+180 && my >= 105 && my <= 141)
    { _onlineScreen.inputFocus = 'name'; return; }
  // Click room field
  if (mx >= W/2-180 && mx <= W/2+180 && my >= 160 && my <= 196)
    { _onlineScreen.inputFocus = 'room'; return; }
  // Click P1/P2 role
  if (my >= 232 && my <= 260) {
    if (mx >= W/2-200 && mx <= W/2+10)  { _onlineScreen.role='p1'; selSnd(); }
    if (mx >= W/2+10  && mx <= W/2+210) { _onlineScreen.role='p2'; selSnd(); }
    return;
  }
  // Click Connect
  if (mx >= W/2-100 && mx <= W/2+100 && my >= 278 && my <= 312) {
    doNetConnect(); return;
  }
});

function doNetConnect() {
  if (!_onlineScreen.nameInput.trim()) { _onlineScreen.err = 'Enter your name!'; return; }
  if (!_onlineScreen.roomInput.trim()) { _onlineScreen.err = 'Enter a room code!'; return; }
  _onlineScreen.err = '';
  _onlineScreen.step = 'lobby';
  netConnect(
    _onlineScreen.nameInput.trim(),
    _onlineScreen.roomInput.trim(),
    _onlineScreen.role === 'p1'
  );
  cfmSnd();
}

// ── PATCH CHAR/STAGE SELECT TO SYNC PICKS ────────────
// We intercept csc/ssc confirmations when in online mode
// and broadcast picks so both players see the same selections

const _origKeydown = null; // handled inline below in existing keydown handler

// ── CS/SS ONLINE SYNC PATCHES ─────────────────────────
// Patched into existing keydown handler by wrapping the confirm keys
function netSyncCsPick(ci) { if(net.enabled) netSend('cs_pick', {ci}); }
function netSyncSsPick(sv) { if(net.enabled) netSend('ss_pick', {sv}); }

// In online mode: P1 host drives P1 char, P2 drives P2 char
// Their picks are received via onNetMessage (cs_pick / ss_pick)
// We patch the CS confirm so P1's 'f' key only locks P1, P2's ',' locks P2

// ── OVERRIDE upP IN MAIN LOOP TO USE NET KEYS ─────────
// The main loop calls: upP(P1,P2,B1); upP(P2,P1,B2);
// In online mode we need to redirect B2 to net.remoteKeys
// We do this by making B1/B2 read from getEffectiveKeys()

// Mark which player is local vs remote
function netIsLocalP1() { return net.isP1; }
function netIsLocalP2() { return !net.isP1; }

// ── ROUND END SYNC ────────────────────────────────────
const _origEndRound = endRound;
function endRound(winner) {
  if (net.enabled) {
    netSend('round_end', { winner: winner === P1 ? 'p1' : 'p2' });
  }
  _origEndRound(winner);
}

// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════

// ===== MAIN LOOP =====
let lt=performance.now();
function loop(now){
  const dt=Math.min(now-lt,40);lt=now;
  if(smT>0){smT--;if(smT<=0)slowmo=false;}
  
  // Screen shake decay
  if(window._screenShake>0){
    window._screenShake*=0.85;
    if(window._screenShake<0.5)window._screenShake=0;
  }
  
  ctx.clearRect(0,0,W,H);
  
  // Apply screen shake
  if(window._screenShake>0){
    const shakeX=(Math.random()-0.5)*window._screenShake*2;
    const shakeY=(Math.random()-0.5)*window._screenShake*2;
    ctx.save();
    ctx.translate(shakeX,shakeY);
  }

  if(SCREEN==='title'){
    drawTitle();
  } else if(SCREEN==='online'){
    drawOnlineScreen();
  } else if(SCREEN==='cs'){
    drawCS();
  } else if(SCREEN==='ss'){
    drawSS();
  } else {
    drawStage();drawParts();
    if(SCREEN==='fight'){
      if(countdown>=0){updateCountdown();}
      else if(gst==='fight'&&cdDone){
        rTick++;if(rTick>=60){rTick=0;rTimer--;if(rTimer<=0){gst='ko';endRound(P1.hp>=P2.hp?P1:P2);}}
        // Online: tick network input system
        if(net.enabled) netTick();
        // Route keys: in online mode P1 uses local/delayed keys, P2 uses remote keys
        const _B1keys = net.enabled ? (net.isP1 ? (net._delayedLocalKeys||keys) : net.remoteKeys) : keys;
        const _B2keys = net.enabled ? (net.isP1 ? net.remoteKeys : (net._delayedLocalKeys||keys)) : keys;
        // Temporarily override keys for each upP call
        const _savedKeys = Object.assign({}, keys);
        if(net.enabled){
          Object.keys(keys).forEach(k=>delete keys[k]);
          Object.assign(keys, _B1keys);
        }
        upP(P1,P2,B1);
        if(net.enabled){
          Object.keys(keys).forEach(k=>delete keys[k]);
          Object.assign(keys, _B2keys);
        }
        upP(P2,P1,B2);
        if(net.enabled){
          Object.keys(keys).forEach(k=>delete keys[k]);
          Object.assign(keys, _savedKeys);
        }
        updHUD();
        updateProjs(P1,P2);updateGasClouds(P1,P2);
        updateSneezeClouds(P1,P2);
        updateSlowClouds(P1,P2);
        updateStunClouds(P1,P2);
        updateLightningBolts(P1,P2);
        updateWebTraps(P1,P2);
        // Nick's systems
        updateNickTraps(P1,P2);
        updateAfterimages(P1,P2);
      }
    }
    // Update clones every frame regardless of screen/gst state
    if(P1&&P2&&militiaClones.length){
      if(CHARS[P1.ci].id==='maxwell')updateMilitiaClones(P2);
      else if(CHARS[P2.ci].id==='maxwell')updateMilitiaClones(P1);
    }
    if(P1&&P2){
      [P1,P2].forEach(p=>{
        const b=p.titan?2.0:p.rageOn?1.22:1;
        ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(p.x,GR,18*b,4,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      });
      drawSprite(P1);drawSprite(P2);
      if(SCREEN==='fight'||SCREEN==='ko'){
        drawMilitiaClones();
        drawNickTraps();
        drawAfterimages();
        drawSneezeClouds();
        drawLightningBolts();
        drawWebTraps();
      }
      if(P1)drawAmmoHUD(P1);if(P2)drawAmmoHUD(P2);
      // Draw Nick's tech tier and dodge buff indicators
      if(P1)drawNickHUD(P1);if(P2)drawNickHUD(P2);
    }
    drawProjs();drawGasClouds();drawSlowClouds();drawStunClouds();
    drawGadgetWheel(P1);drawGadgetWheel(P2);
    drawFlash(P1);drawFlash(P2);
    drawFTs();drawAnnFn();
    drawCountdown();
    if(SCREEN==='ko'||SCREEN==='over')drawKO();
    if(SCREEN==='cards'){updateCardScreen();drawCardScreen();}
    // Online indicator
    if(net.enabled){
      ctx.font='5px "Press Start 2P"';ctx.textAlign='left';
      ctx.fillStyle=net.connected?'#4f4':'#f44';
      ctx.fillText(net.connected?`⚡ ${net.oppName||'?'} • ${net.pingMs}ms`:'⚡ disconnected',6,H-6);
      ctx.textAlign='center';
    }
  }
  
  // Restore from screen shake
  if(window._screenShake>0){
    ctx.restore();
  }
  
  requestAnimationFrame(loop);
}

// Start on title screen with music
setTimeout(()=>{
  AC.resume().then(()=>startMusic()).catch(()=>{});
},100);
requestAnimationFrame(loop);
</script>
